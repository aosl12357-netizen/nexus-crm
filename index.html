function Av({ name, size="md", cls="" }) {
  const sz = { sm:"w-8 h-8 text-sm", md:"w-10 h-10 text-base", lg:"w-12 h-12 text-lg" }[size];
  const col = AV_COLORS[name.charCodeAt(0) % AV_COLORS.length];
  return <div className={`${sz} ${col} rounded-full flex items-center justify-center font-bold text-white flex-shrink-0 ${cls}`}>{name[0]}</div>;
}

function SourceBadge({ source }) {
  const labels = { LINE:"LINE", IG:"IG", "轉介紹":"介紹" };
  const style = source === "IG" ? {background:"linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)"} : {};
  const cls = source === "LINE" ? "line-badge" : source === "IG" ? "ig-badge" : "intro-badge";
  return <span className={`inline-flex items-center rounded-full font-semibold text-white text-xs px-2 py-0.5 ${cls}`} style={style}>{labels[source]||source}</span>;
}

function StageBadge({ stage }) {
  const cfg = STAGE_CFG[stage] || STAGE_CFG["初步接觸"];
  return <span className={`inline-flex items-center gap-1.5 rounded-full text-xs font-medium px-2.5 py-1 ${cfg.wrap}`}><span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`}/>{stage}</span>;
}

      <div className="p-5 pb-3 bg-white sticky top-0 z-10 border-b border-slate-100">
        <div className="flex items-center justify-between mb-4">
          <div><h2 className="text-2xl font-black text-slate-800 tracking-tight">行銷名單</h2><p className="text-slate-500 text-sm mt-0.5">共 {LEADS.length} 筆名單</p></div>
          <button className="flex items-center gap-1.5 bg-violet-600 text-white text-sm font-bold px-4 py-2.5 rounded-xl shadow-sm"><LucideIcon icon="Plus" size={16}/> 新增客戶</button>
        </div>
        <div className="relative mb-3">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><LucideIcon icon="Search" size={15}/></span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋姓名、備註…" className="w-full pl-9 pr-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-300"/>
        </div>
        <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
          {stages.map(s => <button key={s} onClick={()=>setFilter(s)} className={`flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full transition-all ${filter===s?"bg-violet-600 text-white":"bg-slate-100 text-slate-600"}`}>{s}</button>)}
        </div>
      </div>
      <div className="flex-1 overflow-y-auto p-5 pt-4 space-y-3">
        {filtered.map(lead => (
          <div key={lead.id} onClick={()=>setOpen(open===lead.id?null:lead.id)} className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 cursor-pointer hover:border-violet-200 transition-all">
            <div className="flex items-start gap-3">
              <Av name={lead.av}/>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap"><span className="font-bold text-slate-800">{lead.name}</span><SourceBadge source={lead.source}/></div>
                <div className="mt-1.5 flex items-center gap-2 flex-wrap"><StageBadge stage={lead.stage}/><span className="text-xs text-slate-400 flex items-center gap-1"><LucideIcon icon="Calendar" size={11}/>{lead.next}</span></div>
              </div>
              <span className="text-slate-300 mt-1" style={{display:"inline-block",transform:open===lead.id?"rotate(90deg)":"none",transition:"transform 0.2s"}}><LucideIcon icon="ChevronRight" size={16}/></span>
            </div>
            {open===lead.id && (
              <div className="mt-3 pt-3 border-t border-slate-100 space-y-2">
                <div className="text-xs text-slate-600 bg-slate-50 rounded-xl p-3 leading-relaxed">📝 {lead.note}</div>
                <div className="flex gap-2 flex-wrap">{lead.tags.map(t=><span key={t} className="text-xs bg-violet-50 text-violet-700 px-2 py-0.5 rounded-full font-semibold">#{t}</span>)}</div>
                <div className="flex gap-2 pt-1">
                  <button className="flex-1 text-xs font-bold text-violet-700 bg-violet-50 py-2 rounded-xl">編輯資料</button>
                  <button className="flex-1 text-xs font-bold text-slate-700 bg-slate-50 py-2 rounded-xl">發送訊息</button>
                </div>
              </div>
            )}
          </div>
        ))}
        {filtered.length===0 && <div className="text-center py-20 text-slate-400"><div className="flex justify-center mb-3 opacity-30"><LucideIcon icon="Search" size={40}/></div><p className="text-sm">找不到相符的名單</p></div>}
      </div>
    </div>
  );
}

function InboxPage() {
  const [active, setActive] = useState(CONVERSATIONS[0]);
  const [view, setView] = useState("list");
  const [input, setInput] = useState("");
  const [msgs, setMsgs] = useState(CONVERSATIONS[0].msgs);

  function openChat(conv) { setActive(conv); setMsgs(conv.msgs); setView("chat"); }
  function send() {
    if (!input.trim()) return;
    const now = new Date();
    setMsgs(prev=>[...prev,{from:"me",text:input.trim(),time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`}]);
    setInput("");
  }
  const srcDot = s => ({LINE:"bg-green-500",IG:"bg-pink-500","轉介紹":"bg-amber-500"}[s]||"bg-slate-400");

  if (view==="chat") return (
    <div className="flex flex-col h-full">
      <div className="px-4 py-3 bg-white border-b border-slate-100 flex items-center gap-3 sticky top-0 z-10">
        <button onClick={()=>setView("list")} className="flex items-center gap-1 text-violet-600 font-bold text-sm"><LucideIcon icon="ChevronLeft" size={18}/>返回</button>
        <Av name={active.av} size="sm"/>
        <div className="flex-1"><div className="flex items-center gap-2"><span className="font-bold text-slate-800 text-sm">{active.name}</span><SourceBadge source={active.source}/></div><div className="text-xs text-emerald-500 font-semibold">線上</div></div>
        <span className="text-slate-400"><LucideIcon icon="Phone" size={18}/></span>
        <span className="text-slate-400 ml-1"><LucideIcon icon="Info" size={18}/></span>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
        {msgs.map((m,i)=>(
          <div key={i} className={`flex ${m.from==="me"?"justify-end":"justify-start"}`}>
            {m.from!=="me" && <Av name={active.av} size="sm" cls="mr-2 mt-1"/>}
            <div className={`max-w-xs px-3.5 py-2.5 rounded-2xl text-sm leading-relaxed shadow-sm ${m.from==="me"?"bg-violet-600 text-white rounded-br-sm":"bg-white text-slate-800 rounded-bl-sm"}`}>
              {m.text}<div className={`text-xs mt-1 ${m.from==="me"?"text-violet-200":"text-slate-400"}`}>{m.time}</div>
            </div>
          </div>
        ))}
        <div className="text-center pt-1"><span className="text-xs text-slate-400 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-100">🔗 此對話透過 {active.source} 串接</span></div>
      </div>
      <div className="p-3 bg-white border-t border-slate-100">
        <div className="flex items-center gap-2 bg-slate-50 rounded-2xl px-3 py-2 border border-slate-200">
          <span className="text-slate-400"><LucideIcon icon="Smile" size={20}/></span>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="輸入訊息…" className="flex-1 bg-transparent text-sm focus:outline-none text-slate-700 min-w-0"/>
          <span className="text-slate-400"><LucideIcon icon="Paperclip" size={18}/></span>
          <button onClick={send} className="w-8 h-8 bg-violet-600 rounded-xl flex items-center justify-center flex-shrink-0"><span className="text-white"><LucideIcon icon="Send" size={14}/></span></button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="flex flex-col h-full">
      <div className="p-5 pb-3">
        <h2 className="text-2xl font-black text-slate-800 tracking-tight">訊息收件匣</h2>
        <p className="text-slate-500 text-sm mt-0.5">整合 LINE・Instagram 訊息</p>
        <div className="flex gap-2 mt-4">
          {[{label:"全部",cnt:CONVERSATIONS.length},{label:"LINE",cnt:CONVERSATIONS.filter(c=>c.source==="LINE").length},{label:"IG",cnt:CONVERSATIONS.filter(c=>c.source==="IG").length}].map((t,i)=>(
            <button key={t.label} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-full ${i===0?"bg-violet-600 text-white":"bg-slate-100 text-slate-600"}`}>
              {t.label}<span className={`text-xs font-black px-1.5 py-0.5 rounded-full ${i===0?"bg-violet-500 text-white":"bg-slate-200 text-slate-500"}`}>{t.cnt}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="mx-5 mb-3 bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-start gap-2">
        <span className="text-amber-600 flex-shrink-0 mt-0.5"><LucideIcon icon="AlertCircle" size={15}/></span>
        <p className="text-xs text-amber-700 leading-relaxed"><span className="font-bold">串接準備中：</span>LINE 官方帳號與 Instagram API 將在下一版本整合，目前顯示模擬資料。</p>
      </div>
      <div className="flex-1 overflow-y-auto px-4 pb-6 space-y-1">
        {CONVERSATIONS.map(conv=>(
          <div key={conv.id} onClick={()=>openChat(conv)} className="flex items-center gap-3 p-3 rounded-2xl hover:bg-slate-50 cursor-pointer active:bg-slate-100 transition-colors">
            <div className="relative">
              <Av name={conv.av}/>
              <span className={`absolute -bottom-0.5 -right-0.5 w-4 h-4 ${srcDot(conv.source)} rounded-full flex items-center justify-center text-white font-black`} style={{fontSize:"7px"}}>{conv.source==="LINE"?"L":conv.source==="IG"?"IG":"介"}</span>
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between"><span className="font-bold text-slate-800 text-sm">{conv.name}</span><span className="text-xs text-slate-400">{conv.time}</span></div>
              <p className="text-xs text-slate-500 truncate mt-0.5">{conv.last}</p>
            </div>
            {conv.unread>0 && <span className="w-5 h-5 bg-violet-600 text-white text-xs font-black rounded-full flex items-center justify-center flex-shrink-0">{conv.unread}</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

const NAV = [{id:"dashboard",label:"儀表板",icon:"LayoutDashboard"},{id:"leads",label:"名單管理",icon:"List"},{id:"inbox",label:"收件匣",icon:"MessageSquare"}];

function App() {
  const [page, setPage] = useState("dashboard");
  const totalUnread = CONVERSATIONS.reduce((s,c)=>s+c.unread,0);
  const highUrgent = REMINDERS.filter(r=>r.urgency==="high").length;
  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:"#f8fafc"}}>
      <header className="bg-white border-b border-slate-100 px-5 py-3.5 flex items-center justify-between sticky top-0 z-20">
        <div className="flex items-center gap-2.5">
          <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white flex-shrink-0" style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)"}}><LucideIcon icon="Star" size={16}/></div>
          <div><div className="font-black text-slate-800 text-sm leading-tight tracking-widest">NEXUS CRM</div><div className="text-slate-400 leading-tight" style={{fontSize:"10px"}}>行銷名單管理系統</div></div>
        </div>
        <div className="flex items-center gap-3">
          <button className="relative text-slate-500">
            <LucideIcon icon="Bell" size={20}/>
            {highUrgent>0 && <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white font-black rounded-full flex items-center justify-center" style={{fontSize:"9px"}}>{highUrgent}</span>}
          </button>
          <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-sm" style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)"}}>我</div>
        </div>
      </header>
      <main style={{flex:1,overflowY:"auto"}}>
        {page==="dashboard" && <Dashboard/>}
        {page==="leads" && <LeadManagement/>}
        {page==="inbox" && <InboxPage/>}
      </main>
      <nav className="bg-white border-t border-slate-100 px-2 py-2 flex items-center justify-around sticky bottom-0 z-20">
        {NAV.map(item=>{
          const active=page===item.id;
          return (
            <button key={item.id} onClick={()=>setPage(item.id)} className={`flex flex-col items-center gap-1 px-5 py-2 rounded-2xl transition-all relative ${active?"text-violet-600":"text-slate-400"}`}>
              {active && <span className="absolute inset-0 bg-violet-50 rounded-2xl"/>}
              <span className="relative">
                <LucideIcon icon={item.icon} size={22} sw={active?2.5:1.8}/>
                {item.id==="inbox" && totalUnread>0 && <span className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-500 text-white font-black rounded-full flex items-center justify-center" style={{fontSize:"9px"}}>{totalUnread}</span>}
              </span>
              <span className={`relative font-semibold ${active?"text-violet-600":"text-slate-400"}`} style={{fontSize:"10px"}}>{item.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
