<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>財務健檢儀表板 · FinAdvisor Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070b11;color:#e2e8f0;font-family:'Sora',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'DM Mono',monospace}
.card{background:#0c1322;border:1px solid rgba(99,130,190,0.14);border-radius:16px;transition:border-color .25s,box-shadow .25s}
.card:hover{border-color:rgba(99,130,190,0.3);box-shadow:0 0 30px rgba(59,130,246,0.04)}
.card2{background:#101a2e;border:1px solid rgba(99,130,190,0.1);border-radius:10px}
.card3{background:#0d1525;border:1px solid rgba(99,130,190,0.08);border-radius:8px}
input,select{background:rgba(7,11,17,.95);border:1px solid rgba(99,130,190,0.2);border-radius:8px;color:#e2e8f0;padding:8px 12px;font-family:'DM Mono',monospace;font-size:13px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:rgba(59,130,246,.6);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
select option{background:#0c1322;color:#e2e8f0}
label{font-size:10px;color:#4b5e7a;letter-spacing:.07em;text-transform:uppercase;display:block;margin-bottom:5px;font-weight:700}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,130,190,0.18);border-radius:99px}
.tab-btn{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;border:1px solid transparent;color:#4b5e7a;background:transparent;white-space:nowrap;font-family:'Sora',sans-serif}
.tab-btn.active{background:rgba(59,130,246,.13);border-color:rgba(59,130,246,.35);color:#93c5fd}
.tab-btn:hover:not(.active){color:#e2e8f0;background:rgba(255,255,255,.04)}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'Sora',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#4b5e7a;border:1px solid rgba(99,130,190,.2);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn-ghost:hover{border-color:rgba(99,130,190,.38);color:#e2e8f0}
.btn-danger{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.22);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.22);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn-sm:hover{background:rgba(59,130,246,.2)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.02em}
.chip-blue{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.22)}
.chip-green{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.22)}
.chip-amber{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.22)}
.chip-red{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.22)}
.chip-purple{background:rgba(139,92,246,.12);color:#c4b5fd;border:1px solid rgba(139,92,246,.22)}
.chip-cyan{background:rgba(6,182,212,.12);color:#67e8f9;border:1px solid rgba(6,182,212,.22)}
.progress-track{background:rgba(15,23,42,.9);border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.34,1.56,.64,1)}
.rider-indent{margin-left:16px;border-left:2px solid rgba(59,130,246,.18);padding-left:14px;margin-top:6px;margin-bottom:6px}
.section-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#243040;font-weight:700}
.divider{border:none;border-top:1px solid rgba(99,130,190,.1);margin:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .38s ease forwards}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{animation:pulse-dot 2s ease-in-out infinite}
.grid-bg{background-image:radial-gradient(rgba(59,130,246,.055) 1px,transparent 1px);background-size:30px 30px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:#0c1322;border:1px solid rgba(99,130,190,.25);border-radius:18px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.stat-card{display:flex;flex-direction:column;gap:4px;padding:14px 16px;background:#101a2e;border:1px solid rgba(99,130,190,.1);border-radius:12px}
</style>
<script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
</head>
<body class="grid-bg">
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback,useEffect,useRef}=React;

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
const n=v=>parseFloat(String(v||0).replace(/,/g,''))||0;
const fmt=v=>{if(v===undefined||v===null||isNaN(v))return'—';return new Intl.NumberFormat('zh-TW').format(Math.round(v))};
const fmtM=v=>{if(v===undefined||v===null||isNaN(v))return'—';const a=Math.abs(v),s=v<0?'-':'';if(a>=100000000)return s+(a/100000000).toFixed(2)+'億';if(a>=10000000)return s+(a/10000000).toFixed(2)+'千萬';if(a>=10000)return s+(a/10000).toFixed(1)+'萬';return s+fmt(v)};
const pct=(v,d=1)=>isNaN(v)?'—':`${(v*100).toFixed(d)}%`;
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const lerp=(a,b,t)=>a+(b-a)*clamp(t,0,1);
const uid=()=>'id'+Date.now()+Math.random().toString(36).slice(2,7);

/* ─────────────────────────────────────────────
   STOCK DICTIONARY
───────────────────────────────────────────── */
const STOCK_DICT={
  '2330':'台積電','3231':'緯創','5274':'信驊','6806':'森崴能源',
  '0050':'元大台灣50','006208':'富邦台50'
};
const STOCK_DICT_REV=Object.fromEntries(Object.entries(STOCK_DICT).map(([k,v])=>[v,k]));

/* ─────────────────────────────────────────────
   INITIAL MOCK DATA
───────────────────────────────────────────── */
const INIT={
  income:{salary:150000,bonus:300000,yearEnd:200000,dividend:80000},
  expenses:{
    monthly:{housing:38000,food:12000,transport:8000,entertainment:5000,misc:7000},
    annual:{tax:180000,other:60000}
  },
  assets:{
    cash:1800000,
    property:18000000,
    stocks:[
      {id:uid(),ticker:'2330',name:'台積電',shares:300,cost:650,price:920,priceLoading:false,priceError:false},
      {id:uid(),ticker:'3231',name:'緯創',shares:2000,cost:55,price:98,priceLoading:false,priceError:false},
      {id:uid(),ticker:'5274',name:'信驊',shares:150,cost:900,price:1250,priceLoading:false,priceError:false},
      {id:uid(),ticker:'6806',name:'森崴能源',shares:1000,cost:42,price:65,priceLoading:false,priceError:false},
      {id:uid(),ticker:'0050',name:'元大台灣50',shares:500,cost:140,price:198,priceLoading:false,priceError:false},
      {id:uid(),ticker:'006208',name:'富邦台50',shares:800,cost:62,price:85,priceLoading:false,priceError:false},
    ]
  },
  liabilities:{mortgage:8500000,personalLoan:350000},
  goals:{currentAge:38,retireAge:55,targetAmount:50000000},
  policies:[
    {
      id:uid(),company:'富邦人壽',productName:'鑫旺一生終身壽險',type:'終身壽險',
      insuredAmount:5000000,annualPremium:120000,startYear:2018,
      riders:[
        {id:uid(),type:'medical',name:'實支實付醫療附約',annualPremium:18000,miscLimit:150000,dailyLimit:2000,surgeryLimit:120000},
        {id:uid(),type:'critical',name:'重大傷病一次金附約',annualPremium:22000,lumpSum:1000000},
        {id:uid(),type:'accident',name:'意外傷害附約',annualPremium:8000,accidentAmount:3000000,accidentMedical:30000},
      ]
    },
    {
      id:uid(),company:'南山人壽',productName:'多倍保重大疾病險',type:'重大疾病',
      insuredAmount:2000000,annualPremium:68000,startYear:2020,
      riders:[
        {id:uid(),type:'medical',name:'實支實付醫療(限額型)',annualPremium:12000,miscLimit:100000,dailyLimit:1500,surgeryLimit:80000},
        {id:uid(),type:'disability',name:'失能扶助月給付',annualPremium:15000,monthlyBenefit:50000},
      ]
    }
  ]
};

/* ─────────────────────────────────────────────
   SCORE ENGINE
───────────────────────────────────────────── */
function calcScores(st){
  const mInc=n(st.income.salary)+(n(st.income.bonus)+n(st.income.yearEnd))/12+n(st.income.dividend)/12;
  const mExp=Object.values(st.expenses.monthly).reduce((s,v)=>s+n(v),0)+(Object.values(st.expenses.annual).reduce((s,v)=>s+n(v),0))/12;
  const cash=n(st.assets.cash);
  const mDebt=n(st.liabilities.mortgage)*0.004+n(st.liabilities.personalLoan)*0.006;
  const totalDebt=n(st.liabilities.mortgage)+n(st.liabilities.personalLoan);
  const emMonths=cash/(mExp||1);
  const debtRatio=mDebt/(mInc||1);
  const savRate=(mInc-mExp)/(mInc||1);
  const s1=clamp(lerp(0,25,(emMonths-3)/3),0,25);
  const s2=clamp(lerp(25,0,(debtRatio-.30)/.10),0,25);
  const s3=clamp(lerp(0,25,(savRate-.10)/.10),0,25);
  const totalIns=st.policies.reduce((s,p)=>{
    let v=n(p.insuredAmount);
    (p.riders||[]).forEach(r=>{if(r.type==='accident')v+=n(r.accidentAmount)||0});
    return s+v;
  },0);
  const protTarget=totalDebt+mExp*12*5;
  const s4=totalIns>=protTarget?25:clamp(lerp(0,25,totalIns/protTarget),0,25);
  return{s1,s2,s3,s4,total:s1+s2+s3+s4,mInc,mExp,mDebt,totalDebt,emMonths,debtRatio,savRate,totalIns,protTarget,cash};
}

function calcProtection(policies){
  let miscLimit=0,lumpSum=0,accident=0,disability=0,lifeTotal=0;
  policies.forEach(p=>{
    lifeTotal+=n(p.insuredAmount);
    (p.riders||[]).forEach(r=>{
      if(r.type==='medical')miscLimit+=n(r.miscLimit)||0;
      if(r.type==='critical')lumpSum+=n(r.lumpSum)||0;
      if(r.type==='accident')accident+=n(r.accidentAmount)||0;
      if(r.type==='disability')disability+=n(r.monthlyBenefit)||0;
    });
  });
  return{miscLimit,lumpSum,accident,disability,lifeTotal};
}

/* ─────────────────────────────────────────────
   COLOR HELPERS
───────────────────────────────────────────── */
const sCol=(v,mx=25)=>{const r=v/mx;return r>=.8?'#10b981':r>=.5?'#f59e0b':'#ef4444'};
const tCol=s=>s>=75?'#10b981':s>=50?'#f59e0b':'#ef4444';
const tGrade=s=>s>=88?'A+':s>=78?'A':s>=68?'B+':s>=55?'B':'C';

/* ─────────────────────────────────────────────
   SVG ICONS (inline, no external dep)
───────────────────────────────────────────── */
const PATHS={
  up:'M12 19V5M5 12l7-7 7 7',
  down:'M12 5v14M5 12l7 7 7-7',
  plus:'M12 5v14M5 12h14',
  trash:'M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6',
  shield:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
  shieldCheck:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4',
  trending:'M23 6l-9.5 9.5-5-5L1 18',
  target:'M12 22a10 10 0 100-20 10 10 0 000 20zM12 18a6 6 0 100-12 6 6 0 000 12zM12 14a2 2 0 100-4 2 2 0 000 4z',
  wallet:'M21 12V7H5a2 2 0 010-4h14v4M21 12v5H5a2 2 0 010-4h16z',
  landmark:'M3 22V8M21 22V8M12 22V8M3 8l9-6 9 6M1 22h22',
  credit:'M1 4h22v16H1zM1 10h22',
  bar:'M18 20V10M12 20V4M6 20v-6',
  refresh:'M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15',
  x:'M18 6L6 18M6 6l12 12',
  check:'M20 6L9 17l-5-5',
  info:'M12 22a10 10 0 100-20 10 10 0 000 20zM12 8v4M12 16h.01',
  git:'M6 3v12M18 9a3 3 0 100-6 3 3 0 000 6zM6 21a3 3 0 100-6 3 3 0 000 6zM18 9c0 3.87-3.13 7-7 7H6',
};
const Ic=({n:name,size=16,color='currentColor',strokeWidth=2,...rest})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" {...rest}>
    <path d={PATHS[name]||'M12 12h.01'}/>
  </svg>
);

/* ─────────────────────────────────────────────
   SCORE RING
───────────────────────────────────────────── */
function ScoreRing({score,size=200}){
  const r=78,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const filled=circ*(clamp(score,0,100)/100);
  const col=tCol(score);
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={col} stopOpacity=".45"/>
          <stop offset="100%" stopColor={col}/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(20,30,50,.9)" strokeWidth="13"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="url(#rg)" strokeWidth="13"
        strokeDasharray={circ} strokeDashoffset={circ-filled} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`} filter="url(#glow)"
        style={{transition:'stroke-dashoffset 1.4s cubic-bezier(.34,1.56,.64,1)'}}/>
      <text x={cx} y={cy-15} textAnchor="middle" fill={col} fontSize="44" fontWeight="700" fontFamily="DM Mono">{Math.round(score)}</text>
      <text x={cx} y={cy+8} textAnchor="middle" fill="#334155" fontSize="13" fontFamily="Sora">/ 100 分</text>
      <text x={cx} y={cy+30} textAnchor="middle" fill={col} fontSize="18" fontWeight="700" fontFamily="Sora">{tGrade(score)}</text>
    </svg>
  );
}

/* ─────────────────────────────────────────────
   MINI BAR
───────────────────────────────────────────── */
function MiniBar({value,max=25,label,sub}){
  const p=clamp(value/max,0,1);
  const col=sCol(value,max);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'#94a3b8'}}>{label}</span>
        <span className="mono" style={{fontSize:12,fontWeight:500,color:col}}>{value.toFixed(1)}<span style={{color:'#334155'}}>/{max}</span></span>
      </div>
      <div className="progress-track" style={{height:8}}>
        <div className="progress-bar" style={{width:`${p*100}%`,height:8,background:`linear-gradient(90deg,${col}aa,${col})`}}/>
      </div>
      {sub&&<div style={{fontSize:11,color:'#334155',lineHeight:1.5}}>{sub}</div>}
    </div>
  );
}

/* ─────────────────────────────────────────────
   PROT BAR
───────────────────────────────────────────── */
function ProtBar({label,value,target,color='#3b82f6',hint=''}){
  const p=clamp(value/(target||1),0,1);
  const ok=p>=1;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:12,color:'#94a3b8'}}>{label}</span>
          {hint&&<span style={{fontSize:10,color:'#334155'}}>({hint})</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span className={`chip ${ok?'chip-green':'chip-amber'}`} style={{fontSize:10}}>{ok?'✓ 已覆蓋':'有缺口'}</span>
          <span className="mono" style={{fontSize:11,color:'#64748b'}}>{fmtM(value)}<span style={{color:'#243040'}}> / {fmtM(target)}</span></span>
        </div>
      </div>
      <div className="progress-track" style={{height:10}}>
        <div className="progress-bar" style={{width:`${p*100}%`,height:10,background:ok?`linear-gradient(90deg,#059669,#10b981)`:`linear-gradient(90deg,${color}99,${color})`}}/>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   FORM HELPERS
───────────────────────────────────────────── */
function NI({label,value,onChange,pre='$',suf='',type='number',placeholder='0',readOnly=false}){
  return(
    <div>
      <label>{label}</label>
      <div style={{position:'relative'}}>
        {pre&&<span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'#334155',fontSize:12,fontFamily:'DM Mono',pointerEvents:'none'}}>{pre}</span>}
        <input type={type==='text'?'text':'number'} value={value} placeholder={placeholder}
          readOnly={readOnly} onChange={e=>onChange&&onChange(e.target.value)}
          style={{paddingLeft:pre?26:12,paddingRight:suf?40:12,cursor:readOnly?'default':'text',opacity:readOnly?.6:1}}/>
        {suf&&<span style={{position:'absolute',right:11,top:'50%',transform:'translateY(-50%)',color:'#334155',fontSize:11,pointerEvents:'none'}}>{suf}</span>}
      </div>
    </div>
  );
}

function SH({icon,title,sub,badge,extra}){
  return(
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:18,flexWrap:'wrap',gap:8}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:34,height:34,borderRadius:9,background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <Ic n={icon} size={15} color="#93c5fd"/>
        </div>
        <div>
          <h2 style={{fontSize:14,fontWeight:600,color:'#f1f5f9'}}>{title}</h2>
          {sub&&<p style={{fontSize:11,color:'#334155',marginTop:2}}>{sub}</p>}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {badge&&<span className="chip chip-blue">{badge}</span>}
        {extra}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   RIDER FORM
───────────────────────────────────────────── */
const RIDER_TYPES=[
  {value:'medical',label:'醫療實支實付'},
  {value:'critical',label:'重大傷病一次金'},
  {value:'accident',label:'意外傷害防護'},
  {value:'disability',label:'失能扶助'},
];
function RiderForm({rider,onChange,onRemove}){
  return(
    <div className="rider-indent" style={{paddingTop:10,paddingBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <Ic n="git" size={11} color="rgba(59,130,246,.5)"/>
          <span style={{fontSize:10,color:'rgba(59,130,246,.7)',letterSpacing:'.08em',textTransform:'uppercase',fontWeight:700}}>附約</span>
        </div>
        <button className="btn-danger" onClick={onRemove}>刪除</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
        <div>
          <label>附約類別</label>
          <select value={rider.type} onChange={e=>onChange('type',e.target.value)}>
            {RIDER_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
          </select>
        </div>
        <NI label="附約名稱" value={rider.name} onChange={v=>onChange('name',v)} pre="" type="text" placeholder="輸入附約名稱"/>
        <NI label="附約年保費" value={rider.annualPremium} onChange={v=>onChange('annualPremium',v)} suf="元/年"/>
      </div>
      {rider.type==='medical'&&(

/* ─────────────────────────────────────────────
   RETIRE CHART (SVG)
───────────────────────────────────────────── */
function RetireChart({currentAge,retireAge,target,currentAssets,monthlySav}){
  const years=Array.from({length:Math.max(retireAge-currentAge+5,5)},(_,i)=>currentAge+i);
  const r=0.065;
  const data=years.map(age=>{
    const y=age-currentAge;
    const proj=currentAssets*Math.pow(1+r,y)+monthlySav*12*((Math.pow(1+r,y)-1)/r);
    return{age,proj,target};
  });
  const maxV=Math.max(...data.map(d=>Math.max(d.proj,d.target)),1);
  const W=500,H=150,pl=52,pr=12,pt=10,pb=28;
  const iW=W-pl-pr,iH=H-pt-pb;
  const xS=i=>(i/(data.length-1||1))*iW;
  const yS=v=>(1-v/maxV)*iH;
  const projPts=data.map((d,i)=>`${pl+xS(i)},${pt+yS(d.proj)}`).join(' ');
  const targPts=data.map((d,i)=>`${pl+xS(i)},${pt+yS(d.target)}`).join(' ');
  const area=`M${pl},${pt+iH} ${data.map((d,i)=>`${pl+xS(i)},${pt+yS(d.proj)}`).join(' ')} ${pl+iW},${pt+iH}Z`;
  const ticks=[0,maxV/3,maxV*2/3,maxV];
  const labelEvery=Math.ceil(data.length/6);
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      <defs>
        <linearGradient id="retG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#10b981" stopOpacity=".28"/>
          <stop offset="100%" stopColor="#10b981" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i)=>{
        const y=pt+yS(t);
        return<g key={i}>
          <line x1={pl} y1={y} x2={pl+iW} y2={y} stroke="rgba(99,130,190,.07)" strokeWidth="1"/>
          <text x={pl-5} y={y+4} textAnchor="end" fill="#243040" fontSize="9" fontFamily="DM Mono">{fmtM(t)}</text>
        </g>;
      })}
      {data.filter((_,i)=>i%labelEvery===0||i===data.length-1).map((d,_,arr)=>{
        const idx=data.findIndex(x=>x.age===d.age);
        const x=pl+xS(idx);
        return<text key={d.age} x={x} y={H-6} textAnchor="middle" fill="#243040" fontSize="9" fontFamily="DM Mono">{d.age}歲</text>;
      })}
      <path d={area} fill="url(#retG)"/>
      <polyline points={projPts} fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <polyline points={targPts} fill="none" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="5 4" strokeLinecap="round"/>
    </svg>
  );
}

/* ─────────────────────────────────────────────
   CASHFLOW BAR (SVG)
───────────────────────────────────────────── */
function CashflowBar({mInc,mExp,bonusM,yearEndM}){
  const months=Array.from({length:12},(_,i)=>i+1);
  const data=months.map(m=>{
    const extra=(m===6||m===12)?bonusM/2:0;
    const ye=(m===12)?yearEndM:0;
    const inc=mInc+extra+ye;
    const exp=mExp*(0.93+Math.random()*0.14);
    return{m,inc,exp};
  });
  const maxV=Math.max(...data.map(d=>d.inc),1);
  const W=580,H=130,pl=44,pr=8,pt=8,pb=24;
  const iW=W-pl-pr,iH=H-pt-pb;
  const bW=(iW/12-3);
  const ticks=[0,maxV/2,maxV];
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      {ticks.map((t,i)=>{
        const y=pt+iH-(t/maxV)*iH;
        return<g key={i}>
          <line x1={pl} y1={y} x2={pl+iW} y2={y} stroke="rgba(99,130,190,.06)" strokeWidth="1"/>
          <text x={pl-5} y={y+4} textAnchor="end" fill="#243040" fontSize="9" fontFamily="DM Mono">{fmtM(t)}</text>
        </g>;
      })}
      {data.map((d,i)=>{
        const x=pl+i*(iW/12)+2;
        const yInc=pt+iH-(d.inc/maxV)*iH;
        const yExp=pt+iH-(d.exp/maxV)*iH;
        const surplus=d.inc>d.exp;
        return<g key={i}>
          <rect x={x} y={yInc} width={bW/2-1} height={pt+iH-yInc} fill="rgba(59,130,246,.65)" rx="2"/>
          <rect x={x+bW/2} y={yExp} width={bW/2-1} height={pt+iH-yExp} fill={surplus?'rgba(16,185,129,.55)':'rgba(239,68,68,.55)'} rx="2"/>
          <text x={x+bW/2} y={H-5} textAnchor="middle" fill="#243040" fontSize="8" fontFamily="DM Mono">{d.m}月</text>
        </g>;
      })}
    </svg>
  );
}

/* ─────────────────────────────────────────────
   LIVE PRICE FETCHER
───────────────────────────────────────────── */
async function fetchPrice(ticker){
  const proxies=[
    `https://corsproxy.io/?${encodeURIComponent(`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${ticker}.tw`)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${ticker}.tw`)}`
  ];
  for(const url of proxies){
    try{
      const res=await fetch(url,{signal:AbortSignal.timeout(5000)});
      const raw=await res.json();
      const text=typeof raw==='string'?raw:(raw.contents||JSON.stringify(raw));
      const parsed=typeof text==='string'?JSON.parse(text):text;
      const item=parsed?.msgArray?.[0];
      if(item&&item.z&&item.z!=='-'){
        const price=parseFloat(item.z);
        if(!isNaN(price)&&price>0)return price;
      }
    }catch(e){}
  }
  return null;
}

        <div className="section-label" style={{marginBottom:18,color:'#1e3a5f'}}>綜合財務健康評分引擎</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:28,alignItems:'center'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
            <ScoreRing score={sc.total}/>
            <span className={`chip ${sc.total>=75?'chip-green':sc.total>=50?'chip-amber':'chip-red'}`} style={{fontSize:12,padding:'5px 14px'}}>
              {sc.total>=75?'財務健全':sc.total>=50?'需要優化':'急需改善'}
            </span>
          </div>
          <div style={{flex:1,minWidth:260,display:'flex',flexDirection:'column',gap:18}}>
            <MiniBar value={sc.s1} max={25} label="① 預備金安全度 (活存 ÷ 月支出)" sub={`現金 ${fmtM(sc.cash)} ÷ 月支出 ${fmt(sc.mExp)} = ${sc.emMonths.toFixed(1)} 個月（>6個月滿分）`}/>
            <MiniBar value={sc.s2} max={25} label="② 債務負擔比 (月還款 ÷ 月收入)" sub={`月還款 ${fmt(sc.mDebt)} ÷ 月收入 ${fmt(sc.mInc)} = ${pct(sc.debtRatio)}（<30%滿分）`}/>
            <MiniBar value={sc.s3} max={25} label="③ 財富蓄水力 (淨現金流 ÷ 月收入)" sub={`月結餘 ${fmtM(sc.mInc-sc.mExp)} ÷ 月收入 ${fmtM(sc.mInc)} = ${pct(sc.savRate)}（>20%滿分）`}/>
            <MiniBar value={sc.s4} max={25} label="④ 保障責任缺口 (壽險總額 vs 風險缺口)" sub={`總保障 ${fmtM(sc.totalIns)} vs 缺口 ${fmtM(sc.protTarget)}（負債+5年開銷）`}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,minWidth:210}}>
            {[
              {label:'月均收入',val:fmtM(sc.mInc),color:'#3b82f6'},
              {label:'月均支出',val:fmtM(sc.mExp),color:'#ef4444'},
              {label:'月均結餘',val:fmtM(sc.mInc-sc.mExp),color:'#10b981'},
              {label:'壽險總保額',val:fmtM(sc.totalIns),color:'#8b5cf6'},
            ].map(m=>(
              <div key={m.label} className="card2" style={{padding:12}}>
                <div style={{fontSize:9,color:'#334155',marginBottom:4}}>{m.label}</div>
                <div className="mono" style={{fontSize:13,fontWeight:600,color:m.color}}>{m.val}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{display:'flex',gap:6,marginBottom:18,overflowX:'auto',paddingBottom:4}}>
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </div>

      {/* ── TAB: CASHFLOW ── */}
      {tab==='cashflow'&&(
        <div className="fade-in">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,marginBottom:18}}>
            <div className="card" style={{padding:20}}>
              <SH icon="trending" title="收入結構" sub="固定 + 績效 + 非經常性"/>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <NI label="固定月薪" value={st.income.salary} onChange={v=>upd('income.salary',v)} suf="元/月"/>
                <NI label="科技業/業務分紅" value={st.income.bonus} onChange={v=>upd('income.bonus',v)} suf="元/年"/>
                <NI label="年終獎金" value={st.income.yearEnd} onChange={v=>upd('income.yearEnd',v)} suf="元/年"/>
                <NI label="股息/非經常性收入" value={st.income.dividend} onChange={v=>upd('income.dividend',v)} suf="元/年"/>
                <hr className="divider" style={{marginTop:4}}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:12,color:'#64748b'}}>月均總收入</span>
                  <span className="mono" style={{fontSize:17,fontWeight:700,color:'#3b82f6'}}>{fmtM(sc.mInc)}</span>
                </div>
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <SH icon="down" title="支出結構" sub="月固定 + 年度隱形支出"/>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <div className="section-label" style={{marginBottom:2}}>月固定支出</div>
                {[
                  {k:'housing',label:'住房(房貸/租金)'},
                  {k:'food',label:'餐飲伙食'},
                  {k:'transport',label:'交通費'},
                  {k:'entertainment',label:'娛樂休閒'},
                  {k:'misc',label:'其他日常'},
                ].map(({k,label})=>(
                  <NI key={k} label={label} value={st.expenses.monthly[k]} onChange={v=>upd(`expenses.monthly.${k}`,v)} suf="元/月"/>
                ))}
                <div className="section-label" style={{marginTop:6,marginBottom:2}}>年度隱形支出</div>
                <NI label="所得稅金" value={st.expenses.annual.tax} onChange={v=>upd('expenses.annual.tax',v)} suf="元/年"/>
                <NI label="其他年度支出" value={st.expenses.annual.other} onChange={v=>upd('expenses.annual.other',v)} suf="元/年"/>
                <hr className="divider" style={{marginTop:4}}/>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:12,color:'#64748b'}}>月均總支出</span>
                  <span className="mono" style={{fontSize:17,fontWeight:700,color:'#ef4444'}}>{fmtM(sc.mExp)}</span>
                </div>
              </div>
            </div>
          </div>
          <div className="card" style={{padding:20}}>
            <SH icon="bar" title="全年收支概覽" sub="含分紅/年終月份波動（藍=收入，綠/紅=支出）"/>
            <CashflowBar mInc={sc.mInc} mExp={sc.mExp} bonusM={n(st.income.bonus)} yearEndM={n(st.income.yearEnd)}/>
          </div>
        </div>
      )}

      {/* ── TAB: ASSETS ── */}
      {tab==='assets'&&(
        <div className="fade-in">
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:18}}>
            {[
              {label:'總資產',val:fmtM(totalAssets),color:'#3b82f6'},
              {label:'總負債',val:fmtM(totalLiab),color:'#ef4444'},
              {label:'淨資產',val:fmtM(netWorth),color:'#10b981'},
            ].map(m=>(
              <div key={m.label} className="card" style={{padding:16}}>
                <div style={{fontSize:10,color:'#334155',marginBottom:6}}>{m.label}</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,color:m.color}}>{m.val}</div>
              </div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
            <div className="card" style={{padding:20}}>
              <SH icon="wallet" title="現金與不動產" sub="核心資產項目"/>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <NI label="緊急預備金 / 活存現金" value={st.assets.cash} onChange={v=>upd('assets.cash',v)}/>
                <NI label="不動產現值" value={st.assets.property} onChange={v=>upd('assets.property',v)}/>
                <div className="card2" style={{padding:10}}>
                  <div style={{fontSize:10,color:'#334155',marginBottom:8}}>資產配置比例</div>
                  <div style={{display:'flex',height:14,borderRadius:99,overflow:'hidden',gap:2}}>
                    {totalAssets>0&&[
                      {val:n(st.assets.cash),color:'#3b82f6'},
                      {val:n(st.assets.property),color:'#8b5cf6'},
                      {val:stockVal,color:'#06b6d4'},
                    ].map((m,i)=>(
                      m.val>0&&<div key={i} style={{flex:m.val/totalAssets,background:m.color,opacity:.8}}/>
                    ))}
                  </div>
                  <div style={{display:'flex',gap:14,marginTop:8,fontSize:11,color:'#334155',flexWrap:'wrap'}}>
                    {[
                      {label:'現金',val:n(st.assets.cash),color:'#3b82f6'},
                      {label:'不動產',val:n(st.assets.property),color:'#8b5cf6'},
                      {label:'股票ETF',val:stockVal,color:'#06b6d4'},
                    ].map(m=>(
                      <span key={m.label} style={{display:'flex',alignItems:'center',gap:4}}>
                        <span style={{width:8,height:8,borderRadius:2,background:m.color,display:'inline-block'}}/>
                        {m.label} <span className="mono" style={{color:'#64748b'}}>{pct(totalAssets?m.val/totalAssets:0)}</span>
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <SH icon="credit" title="負債明細" sub="長期 / 短期負債"/>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <NI label="房貸餘額" value={st.liabilities.mortgage} onChange={v=>upd('liabilities.mortgage',v)}/>
                <NI label="信貸餘額" value={st.liabilities.personalLoan} onChange={v=>upd('liabilities.personalLoan',v)}/>
                <hr className="divider" style={{marginTop:4}}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {[
                    {label:'月均還款估計',val:fmtM(sc.mDebt),color:'#f87171'},
                    {label:'債務/資產比',val:pct(totalAssets?totalLiab/totalAssets:0),color:'#fcd34d'},
                    {label:'負債/月收入',val:`${(totalLiab/((sc.mInc*12)||1)).toFixed(1)}年`,color:'#94a3b8'},
                    {label:'房貸/信貸比',val:pct(totalLiab?n(st.liabilities.mortgage)/totalLiab:0),color:'#94a3b8'},
                  ].map(m=>(
                    <div key={m.label} className="card2" style={{padding:10}}>
                      <div style={{fontSize:9,color:'#334155',marginBottom:3}}>{m.label}</div>
                      <div className="mono" style={{fontSize:13,fontWeight:600,color:m.color}}>{m.val}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── TAB: STOCKS ── */}
      {tab==='stocks'&&(
        <div className="fade-in">
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:18}}>
            {[
              {label:'總市值',val:fmtM(stockVal),color:'#06b6d4'},
              {label:'總成本',val:fmtM(stockCost),color:'#64748b'},
              {label:'未實現損益',val:fmtM(stockVal-stockCost),color:stockVal>=stockCost?'#10b981':'#ef4444'},
              {label:'報酬率',val:pct(stockCost?(stockVal-stockCost)/stockCost:0),color:stockVal>=stockCost?'#10b981':'#ef4444'},
            ].map(m=>(
              <div key={m.label} className="card" style={{padding:14}}>
                <div style={{fontSize:9,color:'#334155',marginBottom:5}}>{m.label}</div>
                <div className="mono" style={{fontSize:16,fontWeight:700,color:m.color}}>{m.val}</div>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:20}}>
            <SH icon="bar" title="股票 / ETF 持倉" sub="即時報價 · 智慧字典輸入"
              badge={`${st.assets.stocks.length} 檔`}
              extra={<button className="btn-primary" style={{padding:'8px 14px',fontSize:12}} onClick={()=>setShowAddStock(true)}><Ic n="plus" size={13}/>新增標的</button>}/>
            {st.assets.stocks.length===0&&(
              <div style={{textAlign:'center',padding:'30px 0',color:'#334155',fontSize:13}}>尚無持倉，點擊「新增標的」加入</div>
            )}
            {st.assets.stocks.map(s=>(
              <StockRow key={s.id} s={s} onRemove={()=>remStock(s.id)} onRefresh={()=>refreshStock(s.id)}/>
            ))}
            {st.assets.stocks.length>0&&(
              <div style={{display:'flex',gap:16,marginTop:12,fontSize:11,color:'#334155'}}>
                <span style={{display:'flex',alignItems:'center',gap:4}}>
                  <span className="live-dot" style={{width:5,height:5,borderRadius:'50%',background:'#10b981',display:'inline-block'}}/>即時報價（透過 TWSE API）
                </span>
                <span style={{color:'#243040'}}>若取得失敗則顯示「預設值」</span>
              </div>
            )}
          </div>
          {showAddStock&&<AddStockModal onAdd={addStock} onClose={()=>setShowAddStock(false)}/>}
        </div>
      )}

      {/* ── TAB: GOALS ── */}
      {tab==='goals'&&(
        <div className="fade-in">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
            <div className="card" style={{padding:20}}>
              <SH icon="target" title="退休財務目標" sub="複利試算模型"/>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <NI label="現在年齡" value={st.goals.currentAge} onChange={v=>upd('goals.currentAge',v)} pre="" suf="歲"/>
                  <NI label="預計退休年齡" value={st.goals.retireAge} onChange={v=>upd('goals.retireAge',v)} pre="" suf="歲"/>
                </div>
                <NI label="退休目標金額" value={st.goals.targetAmount} onChange={v=>upd('goals.targetAmount',v)}/>
                <div className="card2" style={{padding:12}}>
                  <div className="section-label" style={{marginBottom:8}}>試算假設</div>
                  {[
                    {k:'年化報酬率',v:'6.5%',c:'#10b981'},
                    {k:'距退休',v:`${Math.max(0,n(st.goals.retireAge)-n(st.goals.currentAge))} 年`,c:'#3b82f6'},
                    {k:'月均結餘',v:fmtM(sc.mInc-sc.mExp),c:'#3b82f6'},
                    {k:'現有總資產',v:fmtM(totalAssets),c:'#8b5cf6'},
                  ].map(m=>(
                    <div key={m.k} style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#64748b',padding:'4px 0',borderBottom:'1px solid rgba(99,130,190,.06)'}}>
                      <span>{m.k}</span><span className="mono" style={{color:m.c}}>{m.v}</span>
                    </div>
                  ))}
                </div>
                {(()=>{
                  const yrs=Math.max(0,n(st.goals.retireAge)-n(st.goals.currentAge));
                  const r=.065,sav=sc.mInc-sc.mExp;
                  const proj=totalAssets*Math.pow(1+r,yrs)+sav*12*((Math.pow(1+r,yrs)-1)/r);
                  const ok=proj>=n(st.goals.targetAmount);
                  const progress=clamp(proj/n(st.goals.targetAmount),0,1);
                  return(
                    <div className="card2" style={{padding:14,border:`1px solid ${ok?'rgba(16,185,129,.2)':'rgba(245,158,11,.2)'}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <span style={{fontSize:12,color:'#94a3b8'}}>退休時預估資產</span>
                        <span className={`chip ${ok?'chip-green':'chip-amber'}`}>{ok?'✓ 達標':'需加速'}</span>
                      </div>
                      <div className="mono" style={{fontSize:26,fontWeight:700,color:ok?'#10b981':'#f59e0b'}}>{fmtM(proj)}</div>
                      <div style={{fontSize:11,color:'#334155',marginTop:4,marginBottom:10}}>vs 目標 {fmtM(n(st.goals.targetAmount))}</div>
                      <div className="progress-track" style={{height:8}}>
                        <div className="progress-bar" style={{width:`${progress*100}%`,height:8,background:ok?'#10b981':'#f59e0b'}}/>
                      </div>
                      <div style={{fontSize:10,color:'#334155',marginTop:4,textAlign:'right'}}>達成率 {pct(progress)}</div>
                    </div>
                  );
                })()}
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <SH icon="trending" title="資產成長軌跡" sub="月均儲蓄 × 6.5% 複利推算"/>
              <RetireChart
                currentAge={n(st.goals.currentAge)}
                retireAge={n(st.goals.retireAge)}
                target={n(st.goals.targetAmount)}
                currentAssets={totalAssets}
                monthlySav={sc.mInc-sc.mExp}
              />
              <div style={{display:'flex',gap:18,marginTop:10,fontSize:11,color:'#334155'}}>
                <span style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:14,height:2,background:'#10b981',display:'inline-block',borderRadius:99}}/>資產預估
                </span>
                <span style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:14,height:0,border:'1.5px dashed #f59e0b',display:'inline-block'}}/>退休目標
                </span>
              </div>
              <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:6}}>
                <div className="section-label" style={{marginBottom:6}}>財務里程碑</div>
                {[
                  {label:'突破 1000 萬',age:n(st.goals.currentAge)+2,color:'#3b82f6'},
                  {label:'退休加速期啟動',age:n(st.goals.retireAge)-5,color:'#f59e0b'},
                  {label:'達成退休目標',age:n(st.goals.retireAge),color:'#10b981'},
                ].map(m=>(
                  <div key={m.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderRadius:8,background:'rgba(12,19,34,.8)',border:'1px solid rgba(99,130,190,.09)'}}>
                    <span style={{fontSize:12,color:'#64748b'}}>{m.label}</span>
                    <span className="mono" style={{fontSize:12,fontWeight:600,color:m.color}}>{m.age}歲</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── TAB: INSURANCE ── */}
      {tab==='insurance'&&(
        <div className="fade-in">
          <div className="card" style={{padding:20,marginBottom:16}}>
            <SH icon="shieldCheck" title="五大防護網進度條" sub="同質性保障彙整" badge={`${st.policies.length} 張保單`}/>
            <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:18}}>
              <ProtBar label="壽險保障 vs 責任缺口" value={sc.totalIns} target={sc.protTarget} hint="負債+5年開銷"/>
              <ProtBar label="醫療實支實付雜費限額" value={prot.miscLimit} target={300000} color="#06b6d4" hint="建議≥30萬"/>
              <ProtBar label="重大傷病一次金" value={prot.lumpSum} target={2000000} color="#8b5cf6" hint="建議≥200萬"/>
              <ProtBar label="意外傷害身故/失能" value={prot.accident} target={5000000} color="#f59e0b" hint="建議≥500萬"/>
              <ProtBar label="失能月給付" value={prot.disability} target={50000} color="#10b981" hint="建議≥5萬/月"/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
              {[
                {label:'壽險總保額',val:fmtM(sc.totalIns),color:'#3b82f6'},
                {label:'實支雜費限額',val:fmtM(prot.miscLimit),color:'#06b6d4'},
                {label:'重疾一次金',val:fmtM(prot.lumpSum),color:'#8b5cf6'},
                {label:'意外保障',val:fmtM(prot.accident),color:'#f59e0b'},
                {label:'失能月給付',val:`${fmt(prot.disability)}/月`,color:'#10b981'},
              ].map(m=>(
                <div key={m.label} className="card2" style={{padding:10,textAlign:'center'}}>
                  <div style={{fontSize:9,color:'#334155',marginBottom:4}}>{m.label}</div>
                  <div className="mono" style={{fontSize:12,fontWeight:600,color:m.color}}>{m.val}</div>
                </div>
              ))}
            </div>
          </div>
          {st.policies.map(p=>(
            <PolicyCard key={p.id} policy={p}
              onChange={(f,v)=>updPolicy(p.id,f,v)}
              onRemove={()=>remPolicy(p.id)}/>
          ))}
          <button className="btn-primary" style={{width:'100%',padding:'13px 0',fontSize:14}} onClick={addPolicy}>
            <Ic n="plus" size={15}/> 新增保單
          </button>
        </div>
      )}

      {/* FOOTER */}
      <div style={{marginTop:44,paddingTop:18,borderTop:'1px solid rgba(99,130,190,.08)',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:6}}>
        <div style={{fontSize:11,color:'#111d2e'}}>FinAdvisor Pro · 財務數據僅供顧問分析參考，不構成投資建議</div>
        <div className="mono" style={{fontSize:11,color:'#111d2e'}}>v3.0.0 · All data local</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
