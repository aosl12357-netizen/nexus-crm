<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Insurance CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:       #0d0f12;
  --surface:  #141720;
  --card:     #1a1e2a;
  --border:   #242836;
  --border2:  #2e3347;
  --text:     #e2e6f0;
  --muted:    #6b7494;
  --accent:   #4f8ef7;
  --accent2:  #3dd6b5;
  --warn:     #f5a623;
  --danger:   #f05e6a;
  --mono:     'DM Mono', monospace;
}
* { font-family: 'Noto Sans TC', sans-serif; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); margin: 0; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse-dot {
  0%,100% { opacity:1; } 50% { opacity:.3; }
}
.fade-up { animation: fadeUp .35s ease both; }
.fade-up-1 { animation-delay:.05s; }
.fade-up-2 { animation-delay:.10s; }
.fade-up-3 { animation-delay:.15s; }
.fade-up-4 { animation-delay:.20s; }
.fade-up-5 { animation-delay:.25s; }
.pulse-dot { animation: pulse-dot 1.8s ease-in-out infinite; }

.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 14px; border-radius:8px;
  cursor:pointer; transition:background .15s, color .15s;
  font-size:14px; font-weight:500; color: var(--muted);
  border: none; background: none; width:100%; text-align:left;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--card); color: var(--accent); border-left: 2px solid var(--accent); padding-left:12px; }

.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  transition: border-color .2s;
}
.kpi-card:hover { border-color: var(--border2); }

.badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; border-radius:99px;
  font-size:11px; font-weight:600; white-space:nowrap;
}

.stage-0 { background:#1f2d3d; color:#60a5fa; }
.stage-1 { background:#2a2515; color:#fbbf24; }
.stage-2 { background:#1d2f28; color:#34d399; }
.stage-3 { background:#2f1f28; color:#f472b6; }

.table-row {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.table-row:hover { background: rgba(79,142,247,.05); }
.table-row:last-child { border-bottom: none; }

.mono { font-family: var(--mono); }

.btn-primary {
  display:inline-flex; align-items:center; gap:7px;
  background: var(--accent); color:#fff;
  border:none; border-radius:8px;
  padding:9px 16px; font-size:13px; font-weight:600;
  cursor:pointer; transition:opacity .15s, transform .1s;
}
.btn-primary:hover { opacity:.88; }
.btn-primary:active { transform:scale(.97); }

.reminder-item {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; border-radius:9px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: border-color .2s;
}
.reminder-item:hover { border-color: var(--border2); }

/* Modal */
.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center;
  z-index:100; backdrop-filter:blur(4px);
  animation: fadeUp .2s ease;
}
.modal-box {
  background: var(--card); border:1px solid var(--border2);
  border-radius:14px; padding:28px; width:480px; max-width:94vw;
}
.input-field {
  width:100%; background:var(--surface); border:1px solid var(--border2);
  border-radius:8px; padding:9px 12px; color:var(--text);
  font-size:13px; outline:none; transition:border-color .15s;
}
.input-field:focus { border-color:var(--accent); }
.select-field {
  width:100%; background:var(--surface); border:1px solid var(--border2);
  border-radius:8px; padding:9px 12px; color:var(--text);
  font-size:13px; outline:none; appearance:none; cursor:pointer;
}
.label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; display:block; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

// ── SVG Icons (inline, no CDN needed for icons) ──────────
const Ic = ({ d, size=16, cl="" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round"
    strokeLinejoin="round" className={cl}>
    {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d}/>}
  </svg>
);

const ICONS = {
  dash:    ["M3 3h7v7H3z","M14 3h7v7h-7z","M14 14h7v7h-7z","M3 14h7v7H3z"],
  users:   ["M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2","M23 21v-2a4 4 0 0 0-3-3.87","M16 3.13a4 4 0 0 1 0 7.75","M9 7m-4 0a4 4 0 1 0 8 0 4 4 0 1 0-8 0"],
  bell:    ["M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9","M13.73 21a2 2 0 0 1-3.46 0"],
  plus:    ["M12 5v14","M5 12h14"],
  search:  ["M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0"],
  filter:  ["M22 3H2l8 9.46V19l4 2v-8.54L22 3"],
  close:   ["M18 6 6 18","M6 6l12 12"],
  cal:     ["M8 2v4","M16 2v4","M3 10h18","M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"],
  gift:    ["M20 12v10H4V12","M2 7h20v5H2z","M12 22V7","M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z","M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"],
  trend:   ["M22 7l-8.5 8.5-5-5L2 17","M16 7h6v6"],
  check:   ["M22 11.08V12a10 10 0 1 1-5.93-9.14","M22 4 12 14.01l-3-3"],
  phone:   ["M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.92 3.38 2 2 0 0 1 3.89 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"],
  chevR:   ["M9 18l6-6-6-6"],
  alert:   ["M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z","M12 9v4","M12 17h.01"],
};

const Icon = ({n, size=16, cl=""}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round"
    strokeLinejoin="round" style={{flexShrink:0}} className={cl}>
    {(Array.isArray(ICONS[n])?ICONS[n]:[ICONS[n]||""]).map((p,i)=><path key={i} d={p}/>)}
  </svg>
);

// ── Mock Data ─────────────────────────────────────────────
const STAGE_LABELS = ["名單開發","需求分析","建議書提案","簽約核保"];
const STAGE_CLS    = ["stage-0","stage-1","stage-2","stage-3"];
const INS_TYPES    = ["醫療險","壽險","投資型","儲蓄險","意外險","重疾險","年金險"];

const initClients = [
  { id:1,  name:"陳雅婷", phone:"0912-345-678", type:"醫療險",  premium:48000,  benefit:500000,  stage:3, next:"2026-06-10", note:"VIP，保守型，偏好實支實付" },
  { id:2,  name:"林俊宏", phone:"0923-456-789", type:"投資型",  premium:120000, benefit:0,       stage:1, next:"2026-05-25", note:"詢問美元計價，積極型" },
  { id:3,  name:"黃美玲", phone:"0934-567-890", type:"壽險",    premium:36000,  benefit:3000000, stage:2, next:"2026-05-22", note:"企業主，規劃員工福利" },
  { id:4,  name:"張偉誠", phone:"0945-678-901", type:"年金險",  premium:60000,  benefit:72000,   stage:0, next:"2026-05-28", note:"退休規劃為主" },
  { id:5,  name:"王淑芬", phone:"0956-789-012", type:"儲蓄險",  premium:100000, benefit:130000,  stage:1, next:"2026-06-03", note:"子女教育金規劃" },
  { id:6,  name:"李建志", phone:"0967-890-123", type:"重疾險",  premium:28800,  benefit:1000000, stage:2, next:"2026-05-29", note:"IT工程師，月收入穩定" },
  { id:7,  name:"吳思穎", phone:"0978-901-234", type:"醫療險",  premium:52000,  benefit:600000,  stage:3, next:"2026-07-15", note:"二次成交，已加購" },
  { id:8,  name:"劉冠霖", phone:"0989-012-345", type:"意外險",  premium:18000,  benefit:2000000, stage:0, next:"2026-06-01", note:"IG詢問，初步接觸" },
  { id:9,  name:"蔡明哲", phone:"0910-234-567", type:"投資型",  premium:180000, benefit:0,       stage:1, next:"2026-06-08", note:"高資產客戶，已有基金" },
  { id:10, name:"許雅雯", phone:"0921-345-678", type:"壽險",    premium:42000,  benefit:2000000, stage:3, next:"2026-08-20", note:"已簽約，定期追蹤" },
  { id:11, name:"楊博宇", phone:"0932-456-789", type:"醫療險",  premium:33600,  benefit:400000,  stage:2, next:"2026-06-15", note:"提案中，競品比較" },
  { id:12, name:"謝欣怡", phone:"0943-567-890", type:"儲蓄險",  premium:240000, benefit:310000,  stage:1, next:"2026-05-30", note:"主管層，詢問節稅方案" },
];

const REMINDERS = [
  { id:1, type:"birthday", client:"林俊宏", detail:"生日祝賀",         date:"2026-05-27", urgent:true },
  { id:2, type:"policy",   client:"陳雅婷", detail:"保單週年生效日",   date:"2026-05-30", urgent:true },
  { id:3, type:"follow",   client:"黃美玲", detail:"建議書回覆追蹤",   date:"2026-05-22", urgent:true },
  { id:4, type:"birthday", client:"謝欣怡", detail:"生日祝賀",         date:"2026-06-04", urgent:false },
  { id:5, type:"policy",   client:"吳思穎", detail:"新契約90天關懷",   date:"2026-06-10", urgent:false },
  { id:6, type:"follow",   client:"蔡明哲", detail:"第二次需求訪談",   date:"2026-06-08", urgent:false },
];

// ── Helpers ───────────────────────────────────────────────
const fmt = n => n ? n.toLocaleString() : "—";
const today = () => new Date().toISOString().slice(0,10);
let nextId = 13;

function daysUntil(dateStr) {
  const d = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
  return d;
}

// ── Components ────────────────────────────────────────────

function KpiCard({ label, value, sub, accent, delay }) {
  const colors = { blue:"#4f8ef7", teal:"#3dd6b5", amber:"#f5a623" };
  const c = colors[accent] || colors.blue;
  return (
    <div className={`kpi-card fade-up ${delay}`}>
      <div style={{fontSize:12,color:"var(--muted)",fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",marginBottom:10}}>{label}</div>
      <div style={{fontSize:36,fontWeight:700,fontFamily:"var(--mono)",color:c,lineHeight:1}}>{value}</div>
      {sub && <div style={{fontSize:12,color:"var(--muted)",marginTop:8}}>{sub}</div>}
    </div>
  );
}

function ReminderItem({ r }) {
  const days = daysUntil(r.date);
  const typeIcon = r.type === "birthday" ? "gift" : r.type === "policy" ? "cal" : "bell";
  const urgentColor = r.urgent ? "var(--danger)" : "var(--accent2)";
  return (
    <div className="reminder-item" style={{gap:12}}>
      <div style={{width:34,height:34,borderRadius:8,background:"var(--card)",border:"1px solid var(--border2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:urgentColor}}>
        <Icon n={typeIcon} size={15}/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{r.client}</div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:1}}>{r.detail}</div>
      </div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <div style={{fontFamily:"var(--mono)",fontSize:12,color:urgentColor,fontWeight:600}}>
          {days <= 0 ? "今天" : days === 1 ? "明天" : `${days} 天後`}
        </div>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{r.date.slice(5).replace("-","/")}</div>
      </div>
      {r.urgent && <div className="pulse-dot" style={{width:7,height:7,borderRadius:"50%",background:"var(--danger)",flexShrink:0}}/>}
    </div>
  );
}

function StageDot({ stage }) {
  const colors = ["#60a5fa","#fbbf24","#34d399","#f472b6"];
  return <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:colors[stage],marginRight:5}}/>;
}

function AddModal({ onClose, onAdd }) {
  const [form, setForm] = useState({
    name:"", phone:"", type:"醫療險", premium:"", benefit:"",
    stage:0, next:today(), note:""
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  function submit() {
    if (!form.name.trim()) return;
    onAdd({
      id: nextId++,
      name: form.name,
      phone: form.phone,
      type: form.type,
      premium: parseInt(form.premium)||0,
      benefit: parseInt(form.benefit)||0,
      stage: parseInt(form.stage),
      next: form.next,
      note: form.note,
    });
    onClose();
  }

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
          <span style={{fontWeight:700,fontSize:16,color:"var(--text)"}}>新增客戶</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",display:"flex",padding:4}}>
            <Icon n="close" size={18}/>
          </button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{gridColumn:"1"}}>
            <label className="label">客戶姓名 *</label>
            <input className="input-field" placeholder="王小明" value={form.name} onChange={e=>set("name",e.target.value)}/>
          </div>
          <div>
            <label className="label">聯絡電話</label>
            <input className="input-field" placeholder="09xx-xxx-xxx" value={form.phone} onChange={e=>set("phone",e.target.value)}/>
          </div>
          <div>
            <label className="label">險種規劃</label>
            <select className="select-field" value={form.type} onChange={e=>set("type",e.target.value)}>
              {INS_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label className="label">目前階段</label>
            <select className="select-field" value={form.stage} onChange={e=>set("stage",e.target.value)}>
              {STAGE_LABELS.map((l,i)=><option key={i} value={i}>{l}</option>)}
            </select>
          </div>
          <div>
            <label className="label">年繳保費 (NT$)</label>
            <input className="input-field" type="number" placeholder="48000" value={form.premium} onChange={e=>set("premium",e.target.value)}/>
          </div>
          <div>
            <label className="label">年給付/保額 (NT$)</label>
            <input className="input-field" type="number" placeholder="500000" value={form.benefit} onChange={e=>set("benefit",e.target.value)}/>
          </div>
          <div>
            <label className="label">下次追蹤日</label>
            <input className="input-field" type="date" value={form.next} onChange={e=>set("next",e.target.value)}/>
          </div>
          <div>
            <label className="label">備註</label>
            <input className="input-field" placeholder="簡短備忘" value={form.note} onChange={e=>set("note",e.target.value)}/>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:22}}>
          <button onClick={onClose} style={{background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:8,padding:"9px 16px",fontSize:13,color:"var(--muted)",cursor:"pointer",fontWeight:500}}>取消</button>
          <button className="btn-primary" onClick={submit}><Icon n="check" size={15}/>確認新增</button>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard Page ────────────────────────────────────────
function Dashboard({ clients }) {
  const total = clients.length;
  const thisMonth = clients.filter(c => c.next && c.next.startsWith("2026-05")).length;
  const pending = clients.filter(c => c.stage < 3).length;
  const urgentR = REMINDERS.filter(r => r.urgent);
  const otherR  = REMINDERS.filter(r => !r.urgent);

  return (
    <div style={{padding:"28px 32px",maxWidth:1100}}>
      {/* Header */}
      <div className="fade-up" style={{marginBottom:28}}>
        <div style={{fontSize:22,fontWeight:700,color:"var(--text)",letterSpacing:"-.01em"}}>數據總覽</div>
        <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>Insurance CRM &nbsp;·&nbsp; 2026 年 5 月</div>
      </div>

      {/* KPI */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:28}}>
        <KpiCard label="總客戶數" value={total} sub={`${clients.filter(c=>c.stage===3).length} 位已簽約`} accent="blue" delay="fade-up-1"/>
        <KpiCard label="本月新增名單" value={thisMonth} sub="5 月追蹤記錄" accent="teal" delay="fade-up-2"/>
        <KpiCard label="本月待跟進" value={pending} sub={`${clients.filter(c=>c.stage===1).length} 位需求分析中`} accent="amber" delay="fade-up-3"/>
      </div>

      {/* Reminders */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div className="fade-up fade-up-4">
          <div style={{fontSize:12,fontWeight:600,color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <Icon n="alert" size={13} cl="text-danger"/> 緊急提醒
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {urgentR.map(r=><ReminderItem key={r.id} r={r}/>)}
            {urgentR.length===0 && <div style={{color:"var(--muted)",fontSize:13,padding:"16px 0"}}>目前無緊急提醒</div>}
          </div>
        </div>
        <div className="fade-up fade-up-5">
          <div style={{fontSize:12,fontWeight:600,color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
            <Icon n="bell" size={13}/> 近期安排
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {otherR.map(r=><ReminderItem key={r.id} r={r}/>)}
          </div>
        </div>
      </div>

      {/* Stage Distribution */}
      <div className="fade-up" style={{marginTop:28,background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"20px 22px"}}>
        <div style={{fontSize:12,fontWeight:600,color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:16}}>名單階段分佈</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {STAGE_LABELS.map((lbl,i)=>{
            const cnt = clients.filter(c=>c.stage===i).length;
            const pct = total ? Math.round(cnt/total*100) : 0;
            const barColors = ["#4f8ef7","#fbbf24","#34d399","#f472b6"];
            return (
              <div key={i}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:12,color:"var(--muted)"}}>{lbl}</span>
                  <span style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--text)",fontWeight:600}}>{cnt}</span>
                </div>
                <div style={{height:5,background:"var(--surface)",borderRadius:99,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:barColors[i],borderRadius:99,transition:"width .4s ease"}}/>
                </div>
                <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>{pct}%</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Lead & Policy Table ───────────────────────────────────
function LeadTable({ clients, onAdd, onUpdateStage }) {
  const [search, setSearch] = useState("");
  const [stageF, setStageF] = useState(-1);
  const [showModal, setShowModal] = useState(false);
  const [sortKey, setSortKey] = useState("next");
  const [sortAsc, setSortAsc] = useState(true);

  const filtered = useMemo(() => {
    let r = clients.filter(c =>
      (stageF < 0 || c.stage === stageF) &&
      (c.name.includes(search) || c.phone.includes(search) || c.type.includes(search) || c.note.includes(search))
    );
    r.sort((a,b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (typeof av === "string") return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortAsc ? av-bv : bv-av;
    });
    return r;
  }, [clients, search, stageF, sortKey, sortAsc]);

  function toggleSort(k) {
    if (sortKey===k) setSortAsc(a=>!a);
    else { setSortKey(k); setSortAsc(true); }
  }

  const TH = ({label, k, style={}}) => (
    <th onClick={()=>toggleSort(k)} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:600,color:"var(--muted)",letterSpacing:".06em",textTransform:"uppercase",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",...style}}>
      {label} {sortKey===k ? (sortAsc?"↑":"↓") : ""}
    </th>
  );

  return (
    <div style={{padding:"28px 32px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}} className="fade-up">
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"var(--text)",letterSpacing:"-.01em"}}>客戶與保單名單</div>
          <div style={{fontSize:13,color:"var(--muted)",marginTop:4}}>共 {filtered.length} / {clients.length} 筆</div>
        </div>
        <button className="btn-primary fade-up" onClick={()=>setShowModal(true)}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
          新增客戶
        </button>
      </div>

      {/* Filters */}
      <div className="fade-up fade-up-1" style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:"1",minWidth:180}}>
          <Icon n="search" size={14} cl="" style={{position:"absolute"}}/>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}><path d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋姓名、電話、險種…"
            style={{width:"100%",paddingLeft:34,paddingRight:12,paddingTop:8,paddingBottom:8,background:"var(--card)",border:"1px solid var(--border2)",borderRadius:8,color:"var(--text)",fontSize:13,outline:"none"}}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[{l:"全部",v:-1},...STAGE_LABELS.map((l,i)=>({l,v:i}))].map(({l,v})=>(
            <button key={v} onClick={()=>setStageF(v)}
              style={{padding:"7px 13px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",border:"1px solid",
                borderColor:stageF===v?"var(--accent)":"var(--border2)",
                background:stageF===v?"rgba(79,142,247,.12)":"var(--card)",
                color:stageF===v?"var(--accent)":"var(--muted)",transition:"all .15s"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* Table */}
      <div className="fade-up fade-up-2" style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{borderBottom:"1px solid var(--border)"}}>
                <TH label="客戶 / 電話" k="name"/>
                <TH label="險種" k="type"/>
                <TH label="年繳保費" k="premium"/>
                <TH label="保額 / 年給付" k="benefit"/>
                <TH label="階段" k="stage"/>
                <TH label="下次追蹤" k="next"/>
                <th style={{padding:"10px 14px",width:40}}/>
              </tr>
            </thead>
            <tbody>
              {filtered.map((c,idx)=>{
                const days = daysUntil(c.next);
                const dateColor = days <= 0 ? "var(--danger)" : days <= 3 ? "var(--warn)" : "var(--muted)";
                return (
                  <tr key={c.id} className="table-row">
                    <td style={{padding:"13px 14px"}}>
                      <div style={{fontWeight:600,fontSize:14,color:"var(--text)"}}>{c.name}</div>
                      <div style={{fontSize:12,color:"var(--muted)",fontFamily:"var(--mono)",marginTop:2}}>{c.phone||"—"}</div>
                    </td>
                    <td style={{padding:"13px 14px"}}>
                      <span className="badge" style={{background:"var(--surface)",color:"var(--text)",border:"1px solid var(--border2)",fontSize:11}}>
                        {c.type}
                      </span>
                    </td>
                    <td style={{padding:"13px 14px"}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:600,color:"var(--accent2)"}}>
                        {c.premium ? `NT$ ${fmt(c.premium)}` : "—"}
                      </div>
                    </td>
                    <td style={{padding:"13px 14px"}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--text)"}}>
                        {c.benefit ? `NT$ ${fmt(c.benefit)}` : "—"}
                      </div>
                    </td>
                    <td style={{padding:"13px 14px"}}>
                      <select value={c.stage}
                        onChange={e=>onUpdateStage(c.id, parseInt(e.target.value))}
                        className={`badge ${STAGE_CLS[c.stage]}`}
                        style={{border:"none",cursor:"pointer",appearance:"none",paddingRight:8,outline:"none",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>
                        {STAGE_LABELS.map((l,i)=><option key={i} value={i}>{l}</option>)}
                      </select>
                    </td>
                    <td style={{padding:"13px 14px"}}>
                      <div style={{fontFamily:"var(--mono)",fontSize:12,color:dateColor,fontWeight:600}}>
                        {c.next || "—"}
                      </div>
                      {days <= 3 && days >= 0 && (
                        <div style={{fontSize:10,color:dateColor,marginTop:2}}>
                          {days===0?"今天":days===1?"明天":`${days}天後`}
                        </div>
                      )}
                    </td>
                    <td style={{padding:"13px 14px",color:"var(--muted)"}}>
                      <Icon n="chevR" size={15}/>
                    </td>
                  </tr>
                );
              })}
              {filtered.length===0 && (
                <tr><td colSpan={7} style={{padding:"40px",textAlign:"center",color:"var(--muted)",fontSize:13}}>
                  找不到符合條件的客戶
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      {showModal && <AddModal onClose={()=>setShowModal(false)} onAdd={c=>{onAdd(c);setShowModal(false);}}/>}
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("dash");
  const [clients, setClients] = useState(initClients);

  function addClient(c) { setClients(prev=>[c,...prev]); }
  function updateStage(id, s) { setClients(prev=>prev.map(c=>c.id===id?{...c,stage:s}:c)); }

  const urgentCount = REMINDERS.filter(r=>r.urgent).length;

  const navItems = [
    { id:"dash",  label:"數據總覽",   icon:"dash" },
    { id:"leads", label:"客戶名單",   icon:"users" },
  ];

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"var(--bg)"}}>

      {/* Sidebar */}
      <aside style={{width:220,flexShrink:0,background:"var(--surface)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",padding:"20px 12px"}}>
        {/* Brand */}
        <div style={{padding:"4px 10px 20px",borderBottom:"1px solid var(--border)",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--text)",letterSpacing:".04em"}}>INSURANCE</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:1,fontFamily:"var(--mono)"}}>CRM v1.0</div>
        </div>

        {/* Nav */}
        <nav style={{display:"flex",flexDirection:"column",gap:3}}>
          {navItems.map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              <Icon n={n.icon} size={16}/>
              {n.label}
            </button>
          ))}
        </nav>

        {/* Alerts */}
        <div style={{marginTop:"auto",padding:"12px",background:"var(--card)",borderRadius:9,border:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div className="pulse-dot" style={{width:7,height:7,borderRadius:"50%",background:"var(--danger)",flexShrink:0}}/>
            <span style={{fontSize:11,fontWeight:600,color:"var(--danger)"}}>緊急提醒</span>
          </div>
          <div style={{fontSize:12,color:"var(--muted)"}}>本週有 <span style={{color:"var(--text)",fontWeight:600}}>{urgentCount} 件</span> 待處理事項</div>
          <button onClick={()=>setPage("dash")} style={{marginTop:10,width:"100%",padding:"6px 0",background:"rgba(240,94,106,.08)",border:"1px solid rgba(240,94,106,.2)",borderRadius:6,fontSize:11,color:"var(--danger)",cursor:"pointer",fontWeight:600}}>
            查看提醒
          </button>
        </div>

        {/* Footer */}
        <div style={{marginTop:12,padding:"8px 10px",fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)"}}>
          {clients.length} clients
        </div>
      </aside>

      {/* Main */}
      <main style={{flex:1,overflowY:"auto",overflowX:"hidden"}}>
        {page==="dash" && <Dashboard clients={clients}/>}
        {page==="leads" && <LeadTable clients={clients} onAdd={addClient} onUpdateStage={updateStage}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
