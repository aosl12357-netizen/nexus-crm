<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>財務健檢儀表板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080d14;color:#e2e8f0;font-family:'Sora',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'DM Mono',monospace}
.card{background:#0d1525;border:1px solid rgba(99,130,190,0.13);border-radius:16px;transition:border-color .2s}
.card:hover{border-color:rgba(99,130,190,0.28)}
.card2{background:#111827;border:1px solid rgba(99,130,190,0.1);border-radius:10px}
input,select{background:rgba(8,13,20,0.9);border:1px solid rgba(99,130,190,0.18);border-radius:8px;color:#e2e8f0;padding:8px 12px;font-family:'DM Mono',monospace;font-size:13px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:rgba(59,130,246,0.55);box-shadow:0 0 0 3px rgba(59,130,246,0.09)}
select option{background:#1e293b}
label{font-size:11px;color:#64748b;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px;font-weight:600}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,130,190,0.2);border-radius:99px}
.tab-btn{padding:9px 20px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;border:1px solid transparent;color:#64748b;background:transparent;white-space:nowrap;font-family:'Sora',sans-serif}
.tab-btn.active{background:rgba(59,130,246,0.14);border-color:rgba(59,130,246,0.32);color:#93c5fd}
.tab-btn:hover:not(.active){color:#e2e8f0;background:rgba(255,255,255,0.04)}
.btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'Sora',sans-serif;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#64748b;border:1px solid rgba(99,130,190,0.18);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;display:inline-flex;align-items:center;gap:5px}
.btn-ghost:hover{border-color:rgba(99,130,190,0.35);color:#e2e8f0}
.btn-danger{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.02em}
.chip-blue{background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.22)}
.chip-green{background:rgba(16,185,129,0.12);color:#6ee7b7;border:1px solid rgba(16,185,129,0.22)}
.chip-amber{background:rgba(245,158,11,0.12);color:#fcd34d;border:1px solid rgba(245,158,11,0.22)}
.chip-red{background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.22)}
.chip-purple{background:rgba(139,92,246,0.12);color:#c4b5fd;border:1px solid rgba(139,92,246,0.22)}
.chip-cyan{background:rgba(6,182,212,0.12);color:#67e8f9;border:1px solid rgba(6,182,212,0.22)}
.progress-track{background:rgba(30,41,59,0.8);border-radius:99px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.34,1.56,.64,1)}
.rider-indent{margin-left:18px;border-left:2px solid rgba(59,130,246,0.18);padding-left:14px}
.section-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#334155;font-weight:700}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease forwards}
.grid-dots{background-image:radial-gradient(rgba(59,130,246,0.06) 1px,transparent 1px);background-size:28px 28px}
</style>
</head>
<body class="grid-dots">
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback,useEffect,useRef}=React;

// ── helpers ──────────────────────────────────────────────────────────────────
const n=v=>parseFloat(String(v).replace(/,/g,''))||0;
const fmt=v=>isNaN(v)||v===undefined?'—':new Intl.NumberFormat('zh-TW').format(Math.round(v));
const fmtM=v=>{if(!v&&v!==0)return'—';const a=Math.abs(v);const s=v<0?'-':'';if(a>=10000000)return s+(a/10000000).toFixed(2)+'千萬';if(a>=10000)return s+(a/10000).toFixed(1)+'萬';return s+fmt(v)};
const pct=(v,d=1)=>isNaN(v)?'—':`${(v*100).toFixed(d)}%`;
const clamp=(v,mn,mx)=>Math.min(mx,Math.max(mn,v));
const lerp=(a,b,t)=>a+(b-a)*clamp(t,0,1);

// ── score color ───────────────────────────────────────────────────────────────
const sCol=(v,mx=25)=>{const r=v/mx;return r>=.8?'#10b981':r>=.5?'#f59e0b':'#ef4444'};
const tCol=s=>s>=75?'#10b981':s>=50?'#f59e0b':'#ef4444';
const tGrade=s=>s>=88?'A+':s>=78?'A':s>=68?'B+':s>=55?'B':'C';

// ── initial mock data ─────────────────────────────────────────────────────────
const INIT={
  income:{salary:150000,bonus:300000,dividend:80000},
  expenses:{
    monthly:{housing:38000,food:12000,transport:8000,entertainment:5000,misc:7000},
    annual:{tax:180000,other:60000}
  },
  assets:{
    cash:1800000,
    property:18000000,
    stocks:[
      {id:'s1',ticker:'2330',name:'台積電',shares:300,price:920,cost:650},
      {id:'s2',ticker:'3231',name:'緯創',shares:2000,price:98,cost:55},
      {id:'s3',ticker:'5274',name:'信驊',shares:150,price:1250,cost:900},
      {id:'s4',ticker:'6806',name:'森崴能源',shares:1000,price:65,cost:42},
      {id:'s5',ticker:'0050',name:'元大台灣50',shares:500,price:198,cost:140},
      {id:'s6',ticker:'006208',name:'富邦台灣ESG',shares:800,price:85,cost:62},
    ]
  },
  liabilities:{mortgage:8500000,personalLoan:350000},
  goals:{currentAge:38,retireAge:55,targetAmount:50000000},
  policies:[
    {
      id:'p1',company:'富邦人壽',productName:'鑫旺一生終身壽險',type:'終身壽險',
      insuredAmount:5000000,annualPremium:120000,startYear:2018,
      riders:[
        {id:'r1',type:'medical',name:'實支實付醫療附約',annualPremium:18000,miscLimit:150000,dailyLimit:2000,surgeryLimit:120000},
        {id:'r2',type:'critical',name:'重大傷病一次金',annualPremium:22000,lumpSum:1000000},
        {id:'r3',type:'accident',name:'意外傷害附約',annualPremium:8000,accidentAmount:3000000,accidentMedical:30000},
      ]
    },
    {
      id:'p2',company:'南山人壽',productName:'多倍保重大疾病險',type:'重大疾病',
      insuredAmount:2000000,annualPremium:68000,startYear:2020,
      riders:[
        {id:'r4',type:'medical',name:'實支實付醫療(限額型)',annualPremium:12000,miscLimit:100000,dailyLimit:1500,surgeryLimit:80000},
        {id:'r5',type:'disability',name:'失能扶助月給付',annualPremium:15000,monthlyBenefit:50000},
      ]
    }
  ]
};

// ── score engine ──────────────────────────────────────────────────────────────
function calcScores(st){
  const mInc=n(st.income.salary)+n(st.income.bonus)/12+n(st.income.dividend)/12;
  const mExp=Object.values(st.expenses.monthly).reduce((s,v)=>s+n(v),0)
    +Object.values(st.expenses.annual).reduce((s,v)=>s+n(v),0)/12;
  const cash=n(st.assets.cash);
  const mDebt=n(st.liabilities.mortgage)*0.004+n(st.liabilities.personalLoan)*0.006;
  const totalDebt=n(st.liabilities.mortgage)+n(st.liabilities.personalLoan);
  const emMonths=cash/(mExp||1);
  const debtRatio=mDebt/(mInc||1);
  const savRate=(mInc-mExp)/(mInc||1);
  const s1=clamp(lerp(0,25,(emMonths-3)/3),0,25);
  const s2=clamp(lerp(25,0,(debtRatio-.30)/.10),0,25);
  const s3=clamp(lerp(0,25,(savRate-.10)/.10),0,25);
  const totalIns=st.policies.reduce((s,p)=>{
    let v=n(p.insuredAmount);
    (p.riders||[]).forEach(r=>{if(r.type==='accident')v+=n(r.accidentAmount)||0});
    return s+v;
  },0);
  const protTarget=totalDebt+mExp*12*5;
  const s4=totalIns>=protTarget?25:clamp(lerp(0,25,totalIns/protTarget),0,25);
  return{s1,s2,s3,s4,total:s1+s2+s3+s4,mInc,mExp,mDebt,totalDebt,emMonths,debtRatio,savRate,totalIns,protTarget,cash};
}

function calcProtection(policies){
  let miscLimit=0,lumpSum=0,accident=0,disability=0;
  policies.forEach(p=>(p.riders||[]).forEach(r=>{
    if(r.type==='medical')miscLimit+=n(r.miscLimit)||0;
    if(r.type==='critical')lumpSum+=n(r.lumpSum)||0;
    if(r.type==='accident')accident+=n(r.accidentAmount)||0;
    if(r.type==='disability')disability+=n(r.monthlyBenefit)||0;
  }));
  return{miscLimit,lumpSum,accident,disability};
}

// ── SVG components ────────────────────────────────────────────────────────────
function ScoreRing({score,size=200}){
  const r=78,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const filled=circ*(score/100);
  const col=tCol(score);
  const grade=tGrade(score);
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor={col} stopOpacity=".5"/>
          <stop offset="100%" stopColor={col}/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(30,41,59,0.8)" strokeWidth="12"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="url(#rg)" strokeWidth="12"
        strokeDasharray={circ} strokeDashoffset={circ-filled} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`} filter="url(#glow)"
        style={{transition:'stroke-dashoffset 1.3s cubic-bezier(.34,1.56,.64,1)'}}/>
      <text x={cx} y={cy-14} textAnchor="middle" fill={col} fontSize="42" fontWeight="700" fontFamily="DM Mono">{Math.round(score)}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#475569" fontSize="13" fontFamily="Sora">/ 100 分</text>
      <text x={cx} y={cy+32} textAnchor="middle" fill={col} fontSize="18" fontWeight="700" fontFamily="Sora">{grade}</text>
    </svg>
  );
}

function MiniBar({value,max=25,label,sub}){
  const p=clamp(value/max,0,1);
  const col=sCol(value,max);
  return(
    <div className="space-y-1.5">
      <div className="flex justify-between items-center">
        <span style={{fontSize:12,color:'#94a3b8'}}>{label}</span>
        <span className="mono" style={{fontSize:12,color:col}}>{value.toFixed(1)}<span style={{color:'#475569'}}>/{max}</span></span>
      </div>
      <div className="progress-track" style={{height:8}}>
        <div className="progress-bar" style={{width:`${p*100}%`,height:8,background:col}}/>
      </div>
      {sub&&<div style={{fontSize:11,color:'#475569'}}>{sub}</div>}
    </div>
  );
}

function ProtBar({label,value,target,color='#3b82f6'}){
  const p=clamp(value/target,0,1);
  const ok=p>=1;
  return(
    <div className="space-y-1.5">
      <div className="flex justify-between items-end">
        <span style={{fontSize:12,color:'#94a3b8'}}>{label}</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span className={`chip ${ok?'chip-green':'chip-amber'}`}>{ok?'✓ 覆蓋':'缺口'}</span>
          <span className="mono" style={{fontSize:11,color:'#94a3b8'}}>{fmtM(value)}<span style={{color:'#475569'}}> / {fmtM(target)}</span></span>
        </div>
      </div>
      <div className="progress-track" style={{height:10}}>
        <div className="progress-bar" style={{width:`${p*100}%`,height:10,background:ok?'#10b981':color}}/>
      </div>
    </div>
  );
}

// ── form helpers ──────────────────────────────────────────────────────────────
function NI({label,value,onChange,pre='$',suf='',type='number'}){
  return(
    <div>
      <label>{label}</label>
      <div style={{position:'relative'}}>
        {pre&&<span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#475569',fontSize:12,fontFamily:'DM Mono'}}>{pre}</span>}
        <input type={type==='text'?'text':'number'} value={value} onChange={e=>onChange(e.target.value)}
          style={{paddingLeft:pre?28:12,paddingRight:suf?40:12}}/>
        {suf&&<span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#475569',fontSize:11}}>{suf}</span>}
      </div>
    </div>
  );
}

function SH({icon,title,sub,badge}){
  const icons={
    'trending-up':'M23 6l-9.5 9.5-5-5L1 18',
    'arrow-up-right':'M7 7h10v10M7 17L17 7',
    'arrow-down-right':'M7 7h10v10M17 17L7 7',
    'landmark':'M3 22V8M21 22V8M12 22V8M3 8l9-6 9 6M1 22h22',
    'shield-check':'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4',
    'target':'M12 22a10 10 0 100-20 10 10 0 000 20zM12 18a6 6 0 100-12 6 6 0 000 12zM12 14a2 2 0 100-4 2 2 0 000 4z',
    'bar-chart-2':'M18 20V10M12 20V4M6 20v-6',
    'pie-chart':'M21.21 15.89A10 10 0 118 2.83M22 12A10 10 0 0012 2v10z',
    'credit-card':'M1 4h22v16H1zM1 10h22',
    'plus':'M12 5v14M5 12h14',
    'git-branch':'M6 3v12M18 9a3 3 0 100-6 3 3 0 000 6zM6 21a3 3 0 100-6 3 3 0 000 6zM18 9c0 3.87-3.13 7-7 7H6',
    'wallet':'M21 12V7H5a2 2 0 010-4h14v4M21 12v5H5a2 2 0 010-4h16zM21 12H5',
    'line-chart':'M3 3v18h18M3 9l7-4 4 4 7-7M3 15l7-2 4 2 7-4',
  };
  const d=icons[icon]||'M12 12h.01';
  return(
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:36,height:36,borderRadius:10,background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#93c5fd" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>
        </div>
        <div>
          <h2 style={{fontSize:15,fontWeight:600,color:'#e2e8f0'}}>{title}</h2>
          {sub&&<p style={{fontSize:11,color:'#475569',marginTop:2}}>{sub}</p>}
        </div>
      </div>
      {badge&&<span className="chip chip-blue">{badge}</span>}
    </div>
  );
}

// ── Rider form ────────────────────────────────────────────────────────────────
const RIDER_TYPES=[
  {value:'medical',label:'醫療實支實付'},
  {value:'critical',label:'重大傷病一次金'},
  {value:'accident',label:'意外傷害防護'},
  {value:'disability',label:'失能扶助'},
];

function RiderForm({rider,onChange,onRemove}){
  return(
    <div className="rider-indent" style={{paddingTop:12,paddingBottom:12,marginTop:4,marginBottom:4}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span className="section-label" style={{color:'#3b82f6'}}>附約</span>
        <button className="btn-danger" onClick={onRemove}>刪除</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <div>
          <label>附約類別</label>
          <select value={rider.type} onChange={e=>onChange('type',e.target.value)}>
            {RIDER_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
          </select>
        </div>
        <NI label="附約名稱" value={rider.name} onChange={v=>onChange('name',v)} pre="" type="text"/>
        <NI label="附約年保費" value={rider.annualPremium} onChange={v=>onChange('annualPremium',v)} suf="元/年"/>
      </div>
      {rider.type==='medical'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          <NI label="雜費限額" value={rider.miscLimit||''} onChange={v=>onChange('miscLimit',v)}/>
          <NI label="每日病房費" value={rider.dailyLimit||''} onChange={v=>onChange('dailyLimit',v)}/>
          <NI label="手術費限額" value={rider.surgeryLimit||''} onChange={v=>onChange('surgeryLimit',v)}/>
        </div>
      )}
      {rider.type==='critical'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <NI label="重大傷病一次金" value={rider.lumpSum||''} onChange={v=>onChange('lumpSum',v)}/>
        </div>
      )}
      {rider.type==='accident'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <NI label="意外身故/失能保額" value={rider.accidentAmount||''} onChange={v=>onChange('accidentAmount',v)}/>
          <NI label="意外醫療限額" value={rider.accidentMedical||''} onChange={v=>onChange('accidentMedical',v)}/>
        </div>
      )}
      {rider.type==='disability'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <NI label="月給付金" value={rider.monthlyBenefit||''} onChange={v=>onChange('monthlyBenefit',v)} suf="元/月"/>
        </div>
      )}
    </div>
  );
}

// ── Policy Card ───────────────────────────────────────────────────────────────
function PolicyCard({policy,onChange,onRemove}){
  const total=n(policy.annualPremium)+(policy.riders||[]).reduce((s,r)=>s+n(r.annualPremium),0);
  const updRider=(rid,f,v)=>onChange('riders',(policy.riders||[]).map(r=>r.id===rid?{...r,[f]:v}:r));
  const remRider=rid=>onChange('riders',(policy.riders||[]).filter(r=>r.id!==rid));
  const addRider=()=>onChange('riders',[...(policy.riders||[]),{id:'r'+Date.now(),type:'medical',name:'新附約',annualPremium:0,miscLimit:0,dailyLimit:0,surgeryLimit:0}]);
  return(
    <div className="card" style={{padding:20,marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
        <div>
          <div style={{display:'flex',gap:8,marginBottom:6}}>
            <span className="chip chip-purple">{policy.type||'壽險'}</span>
            <span style={{fontSize:12,color:'#475569'}}>{policy.company}</span>
          </div>
          <div style={{fontSize:15,fontWeight:600,color:'#e2e8f0'}}>{policy.productName}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11,color:'#475569'}}>年總保費</div>
          <div className="mono" style={{fontSize:16,fontWeight:700,color:'#f59e0b'}}>${fmt(total)}</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <NI label="保險公司" value={policy.company} onChange={v=>onChange('company',v)} pre="" type="text"/>
        <NI label="商品名稱" value={policy.productName} onChange={v=>onChange('productName',v)} pre="" type="text"/>
        <NI label="主約保額" value={policy.insuredAmount} onChange={v=>onChange('insuredAmount',v)}/>
        <NI label="主約年保費" value={policy.annualPremium} onChange={v=>onChange('annualPremium',v)} suf="元/年"/>
        <div>
          <label>保單類型</label>
          <select value={policy.type} onChange={e=>onChange('type',e.target.value)}>
            {['終身壽險','定期壽險','重大疾病','投資型','醫療險'].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <NI label="投保年份" value={policy.startYear} onChange={v=>onChange('startYear',v)} pre=""/>
      </div>
      <div style={{borderTop:'1px solid rgba(99,130,190,0.1)',paddingTop:14}}>
        <div className="section-label" style={{marginBottom:10}}>附約明細</div>
        {(policy.riders||[]).map(r=>(

// ── Sparkline chart (pure SVG) ────────────────────────────────────────────────
function Sparkline({data,width=300,height=80,color='#3b82f6'}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),range=mx-mn||1;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*width;
    const y=height-(((v-mn)/range)*(height*0.8)+height*0.1);
    return`${x},${y}`;
  }).join(' ');
  const area=`M0,${height} L${pts.split(' ').map(p=>`${p}`).join(' L')} L${width},${height} Z`;
  return(
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{overflow:'visible'}}>
      <defs>
        <linearGradient id={`sg${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#sg${color.replace('#','')})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ── Retirement bar chart (SVG) ─────────────────────────────────────────────────
function RetireChart({currentAge,retireAge,targetAmount,currentAssets,monthlySav}){
  const years=Array.from({length:retireAge-currentAge+4},(_,i)=>currentAge+i);
  const r=0.065;
  const data=years.map(age=>{
    const y=age-currentAge;
    const proj=currentAssets*Math.pow(1+r,y)+monthlySav*12*((Math.pow(1+r,y)-1)/r);
    return{age,proj,target:targetAmount};
  });
  const maxV=Math.max(...data.map(d=>Math.max(d.proj,d.target)));
  const W=560,H=160,pad={l:50,r:10,t:10,b:30};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const xS=i=>(i/(data.length-1))*iW;
  const yS=v=>(1-(v/maxV))*iH;
  const projPts=data.map((d,i)=>`${pad.l+xS(i)},${pad.t+yS(d.proj)}`).join(' ');
  const targPts=data.map((d,i)=>`${pad.l+xS(i)},${pad.t+yS(d.target)}`).join(' ');
  const area=`M${pad.l},${pad.t+iH} ${data.map((d,i)=>`${pad.l+xS(i)},${pad.t+yS(d.proj)}`).join(' ')} ${pad.l+iW},${pad.t+iH}Z`;
  const ticks=[0,maxV/4,maxV/2,maxV*3/4,maxV];
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      <defs>
        <linearGradient id="retGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#10b981" stopOpacity=".35"/>
          <stop offset="100%" stopColor="#10b981" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {ticks.map((t,i)=>{
        const y=pad.t+yS(t);
        return<g key={i}><line x1={pad.l} y1={y} x2={pad.l+iW} y2={y} stroke="rgba(99,130,190,0.07)" strokeWidth="1"/><text x={pad.l-6} y={y+4} textAnchor="end" fill="#334155" fontSize="9" fontFamily="DM Mono">{fmtM(t)}</text></g>;
      })}
      {data.filter((_,i)=>i%3===0).map((d,i,arr)=>{
        const idx=data.indexOf(d);
        const x=pad.l+xS(idx);
        return<text key={i} x={x} y={H-10} textAnchor="middle" fill="#334155" fontSize="9" fontFamily="DM Mono">{d.age}</text>;
      })}
      <path d={area} fill="url(#retGrad)"/>
      <polyline points={projPts} fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <polyline points={targPts} fill="none" stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="5 4" strokeLinecap="round"/>
      <text x={W-pad.r} y={pad.t+yS(targetAmount)-6} textAnchor="end" fill="#f59e0b" fontSize="9" fontFamily="Sora">目標 {fmtM(targetAmount)}</text>
    </svg>
  );
}

                  ))}
                </div>
                <div style={{display:'flex',gap:16,marginTop:8,fontSize:11,color:'#475569'}}>
                  {[{val:n(st.assets.cash),color:'#3b82f6',label:'現金'},{val:n(st.assets.property),color:'#8b5cf6',label:'不動產'},{val:stockVal,color:'#06b6d4',label:'股票ETF'}].map(m=>(
                    <span key={m.label} style={{display:'flex',alignItems:'center',gap:4}}>
                      <span style={{width:8,height:8,borderRadius:2,background:m.color,display:'inline-block'}}/>
                      {m.label} {totalAssets>0?pct(m.val/totalAssets):'—'}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Tab: goals ── */}
      {tab==='goals'&&(
        <div className="fade-in">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
            <div className="card" style={{padding:20}}>
              <SH icon="target" title="退休財務目標" sub="輸入目標進行試算"/>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <NI label="現在年齡" value={st.goals.currentAge} onChange={v=>upd('goals.currentAge',v)} pre="" suf="歲"/>
                  <NI label="預計退休年齡" value={st.goals.retireAge} onChange={v=>upd('goals.retireAge',v)} pre="" suf="歲"/>
                </div>
                <NI label="退休目標金額" value={st.goals.targetAmount} onChange={v=>upd('goals.targetAmount',v)}/>
                <div className="card2" style={{padding:14,display:'flex',flexDirection:'column',gap:8}}>
                  <div className="section-label">試算假設條件</div>
                  {[
                    {k:'年化報酬率假設',v:'6.5%',c:'#10b981'},
                    {k:'距退休年數',v:`${Math.max(0,n(st.goals.retireAge)-n(st.goals.currentAge))} 年`,c:'#3b82f6'},
                    {k:'月均可投資結餘',v:fmtM(sc.mInc-sc.mExp),c:'#3b82f6'},
                    {k:'當前總資產',v:fmtM(totalAssets),c:'#8b5cf6'},
                  ].map(m=>(
                    <div key={m.k} style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#64748b'}}>
                      <span>{m.k}</span><span className="mono" style={{color:m.c}}>{m.v}</span>
                    </div>
                  ))}
                </div>
                {(()=>{
                  const yrs=n(st.goals.retireAge)-n(st.goals.currentAge);
                  const r=0.065,sav=sc.mInc-sc.mExp;
                  const proj=totalAssets*Math.pow(1+r,yrs)+sav*12*((Math.pow(1+r,yrs)-1)/r);
                  const ok=proj>=n(st.goals.targetAmount);
                  return(
                    <div className="card2" style={{padding:14,border:`1px solid ${ok?'rgba(16,185,129,0.2)':'rgba(245,158,11,0.2)'}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <span style={{fontSize:13,color:'#cbd5e1'}}>退休時預估資產</span>
                        <span className={`chip ${ok?'chip-green':'chip-amber'}`}>{ok?'✓ 達標':'需加速儲蓄'}</span>
                      </div>
                      <div className="mono" style={{fontSize:28,fontWeight:700,color:ok?'#10b981':'#f59e0b'}}>{fmtM(proj)}</div>
                      <div style={{fontSize:11,color:'#475569',marginTop:4}}>vs 目標 {fmtM(n(st.goals.targetAmount))}</div>
                      <div style={{marginTop:12}}>
                        <div className="progress-track" style={{height:8}}>
                          <div className="progress-bar" style={{width:`${clamp(proj/n(st.goals.targetAmount),0,1)*100}%`,height:8,background:ok?'#10b981':'#f59e0b'}}/>
                        </div>
                        <div style={{fontSize:10,color:'#475569',marginTop:4,textAlign:'right'}}>{pct(clamp(proj/n(st.goals.targetAmount),0,1))} 達成率</div>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <SH icon="line-chart" title="資產成長軌跡" sub="含月均儲蓄 6.5% 複利累積"/>
              <RetireChart
                currentAge={n(st.goals.currentAge)}
                retireAge={n(st.goals.retireAge)}
                targetAmount={n(st.goals.targetAmount)}
                currentAssets={totalAssets}
                monthlySav={sc.mInc-sc.mExp}
              />
              <div style={{display:'flex',gap:16,marginTop:12,fontSize:11,color:'#475569'}}>
                <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:2,background:'#10b981',display:'inline-block',borderRadius:99}}/>資產預估</span>
                <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:0,border:'1.5px dashed #f59e0b',display:'inline-block'}}/>退休目標</span>
              </div>
              {/* Milestone chips */}
              <div style={{marginTop:20}}>
                <div className="section-label" style={{marginBottom:10}}>關鍵里程碑</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {[
                    {label:'預計達成 5000 萬',age:n(st.goals.retireAge),color:'#10b981'},
                    {label:'退休前最後 5 年加速期',age:n(st.goals.retireAge)-5,color:'#f59e0b'},
                    {label:'資產超越負債總額',age:n(st.goals.currentAge)+3,color:'#3b82f6'},
                  ].map(m=>(
                    <div key={m.label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderRadius:8,background:'rgba(15,23,42,0.5)',border:'1px solid rgba(99,130,190,0.1)'}}>
                      <span style={{fontSize:12,color:'#94a3b8'}}>{m.label}</span>
                      <span className="mono" style={{fontSize:13,fontWeight:600,color:m.color}}>{m.age} 歲</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Tab: insurance ── */}
      {tab==='insurance'&&(
        <div className="fade-in">
          {/* Protection summary */}
          <div className="card" style={{padding:20,marginBottom:20}}>
            <SH icon="shield-check" title="總防護網進度" sub="各類保障額度彙整" badge={`${st.policies.length} 張保單`}/>
            <div style={{display:'flex',flexDirection:'column',gap:16,marginBottom:20}}>
              <ProtBar label="壽險保障 vs 責任缺口（負債+5年開銷）" value={sc.totalIns} target={sc.protTarget}/>
              <ProtBar label="醫療實支實付雜費限額（建議 ≥30萬）" value={prot.miscLimit} target={300000} color="#06b6d4"/>
              <ProtBar label="重大傷病一次金（建議 ≥200萬）" value={prot.lumpSum} target={2000000} color="#8b5cf6"/>
              <ProtBar label="意外傷害保障（建議 ≥500萬）" value={prot.accident} target={5000000} color="#f59e0b"/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
              {[
                {label:'壽險總保額',val:fmtM(sc.totalIns),color:'#3b82f6'},
                {label:'實支雜費限額',val:fmtM(prot.miscLimit),color:'#06b6d4'},
                {label:'重疾一次金',val:fmtM(prot.lumpSum),color:'#8b5cf6'},
                {label:'失能月給付',val:`${fmt(prot.disability)}/月`,color:'#10b981'},
              ].map(m=>(
                <div key={m.label} className="card2" style={{padding:12,textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#475569',marginBottom:4}}>{m.label}</div>
                  <div className="mono" style={{fontSize:13,fontWeight:600,color:m.color}}>{m.val}</div>
                </div>
              ))}
            </div>
          </div>
          {/* Policy cards */}
          {st.policies.map(p=>(
            <PolicyCard key={p.id} policy={p}
              onChange={(f,v)=>updPolicy(p.id,f,v)}
              onRemove={()=>remPolicy(p.id)}/>
          ))}
          <button className="btn-primary" style={{width:'100%',justifyContent:'center',padding:'13px 0'}} onClick={addPolicy}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
            新增保單
          </button>
        </div>
      )}

      {/* Footer */}
      <div style={{marginTop:48,paddingTop:20,borderTop:'1px solid rgba(99,130,190,0.1)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <div style={{fontSize:11,color:'#1e293b'}}>FinAdvisor Pro · 財務數據僅供顧問分析參考，不構成投資建議</div>
        <div className="mono" style={{fontSize:11,color:'#1e293b'}}>v2.1.0 · All data stored locally</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
